<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src https://clob.polymarket.com https://api.the-odds-api.com; img-src 'none'; font-src 'none'; frame-src 'none'; object-src 'none'; base-uri 'self'">
  <title>UFC Odds Risk Intel Dashboard</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface-hover: #1c2129;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #10b981;
      --accent-dim: #059669;
      --accent-glow: rgba(16,185,129,0.15);
      --warn: #f59e0b;
      --danger: #ef4444;
      --info: #3b82f6;
      --lock: #10b981;
      --lean: #3b82f6;
      --tossup: #f59e0b;
      --upset: #ef4444;
      --radius: 8px;
      --radius-sm: 4px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 15px; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      line-height: 1.5;
      min-height: 100vh;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    :focus:not(:focus-visible) { outline: none; }

    .page { max-width: 1100px; margin: 0 auto; padding: 0 16px 64px; }
    header {
      padding: 20px 0 16px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .logo { font-size: 1.3rem; font-weight: 700; color: var(--accent); letter-spacing: -0.02em; }
    .logo-sub { font-size: 0.8rem; color: var(--muted); font-weight: 400; margin-left: 4px; }
    .header-meta { margin-left: auto; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .last-updated { font-size: 0.75rem; color: var(--muted); }
    .btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 14px;
      border-radius: var(--radius-sm);
      font-size: 0.8rem;
      cursor: pointer;
      transition: border-color .15s, background .15s, transform .1s;
    }
    .btn:hover { border-color: var(--accent); background: var(--accent-glow); }
    .btn:active { transform: scale(0.97); }
    .btn-accent { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
    .btn-accent:hover { background: var(--accent-dim); border-color: var(--accent-dim); }
    .btn-danger { border-color: var(--danger); color: var(--danger); }
    .btn-danger:hover { background: rgba(239,68,68,0.1); }

    .key-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 16px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-wrap: wrap;
      transition: border-color .2s;
    }
    .key-panel:focus-within { border-color: var(--accent); }
    .key-panel label { font-size: 0.8rem; color: var(--muted); display: block; margin-bottom: 4px; }
    .key-panel input {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 10px;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      width: 260px;
      max-width: 100%;
      font-family: monospace;
      transition: border-color .15s, box-shadow .15s;
    }
    .key-panel input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }
    .key-hint { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }
    .key-status { font-size: 0.72rem; margin-top: 2px; display: flex; align-items: center; gap: 4px; }
    .key-status-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
    .key-status-active .key-status-dot { background: var(--accent); }
    .key-status-active { color: var(--accent); }
    .key-status-none .key-status-dot { background: var(--muted); }
    .key-status-none { color: var(--muted); }

    .banner {
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-size: 0.83rem;
      margin-bottom: 10px;
      border-left: 3px solid transparent;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      animation: bannerIn .25s ease-out;
    }
    @keyframes bannerIn {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .banner-warn   { background: rgba(245,158,11,0.08); border-color: var(--warn);   color: var(--warn);   }
    .banner-danger { background: rgba(239,68,68,0.08);  border-color: var(--danger); color: var(--danger); }
    .banner-info   { background: rgba(59,130,246,0.08); border-color: var(--info);   color: var(--info);   }
    .banner-success{ background: var(--accent-glow);    border-color: var(--accent); color: var(--accent); }
    .banner-icon { flex-shrink: 0; font-size: 0.95rem; margin-top: 0.05em; }
    .banner-body { flex: 1; }
    .banner-title { font-weight: 600; margin-bottom: 2px; }
    #banners { margin-bottom: 8px; }

    .summary-strip { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
    .summary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      transition: border-color .2s;
    }
    .summary-card:hover { border-color: var(--muted); }
    .summary-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 10px; font-weight: 600; }
    .summary-empty { color: var(--muted); font-size: 0.82rem; font-style: italic; }
    .summary-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .summary-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.82rem;
      padding: 4px 6px;
      border-radius: var(--radius-sm);
      transition: background .15s;
    }
    .summary-item:hover { background: var(--accent-glow); }
    .summary-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .summary-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .summary-prob { color: var(--muted); font-size: 0.75rem; margin-left: auto; flex-shrink: 0; font-family: monospace; }

    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; gap: 8px; }
    .section-title { font-size: 1rem; font-weight: 600; color: var(--text); }
    .count-badge { background: var(--accent-glow); border: 1px solid var(--accent); color: var(--accent); font-size: 0.7rem; padding: 2px 8px; border-radius: 20px; font-weight: 600; }

    .fight-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 14px; }
    .fight-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: border-color .2s, background .2s, transform .15s;
      animation: cardIn .3s ease-out both;
    }
    .fight-card:hover { border-color: var(--muted); background: var(--surface-hover); }
    .fight-card[data-tier="lock"]   { border-left: 3px solid var(--lock); }
    .fight-card[data-tier="lean"]   { border-left: 3px solid var(--lean); }
    .fight-card[data-tier="tossup"] { border-left: 3px solid var(--tossup); }
    .fight-card[data-tier="upset"]  { border-left: 3px solid var(--upset); }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .fight-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
    .tier-badge { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; padding: 3px 7px; border-radius: 3px; flex-shrink: 0; }
    .tier-lock   { background: rgba(16,185,129,0.15); color: var(--lock); }
    .tier-lean   { background: rgba(59,130,246,0.15);  color: var(--lean); }
    .tier-tossup { background: rgba(245,158,11,0.15);  color: var(--tossup); }
    .tier-upset  { background: rgba(239,68,68,0.15);   color: var(--upset); }

    .fight-matchup { flex: 1; }
    .fighter-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .fighter-name { font-size: 0.9rem; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 160px; }
    .fighter-prob { margin-left: auto; font-size: 0.85rem; font-weight: 700; flex-shrink: 0; font-family: monospace; }
    .fighter-prob-fav { color: var(--accent); }
    .fighter-prob-dog { color: var(--danger); }
    .fighter-american { font-size: 0.72rem; color: var(--muted); font-family: monospace; margin-left: 4px; flex-shrink: 0; }
    .vs-divider { font-size: 0.65rem; color: var(--muted); padding: 0 4px; }

    .prob-bar-wrap { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin-bottom: 6px; }
    .prob-bar-fill { height: 100%; border-radius: 2px; transition: width .5s ease; }

    .ci-row { display: flex; align-items: center; gap: 6px; font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
    .ci-track { flex: 1; height: 6px; background: var(--border); border-radius: 3px; position: relative; overflow: visible; }
    .ci-fill { position: absolute; height: 100%; background: rgba(16,185,129,0.35); border-radius: 3px; transition: left .4s, width .4s; }
    .ci-center { position: absolute; width: 2px; height: 10px; top: -2px; background: var(--accent); border-radius: 1px; transition: left .4s; }
    .ci-label { font-size: 0.65rem; color: var(--muted); margin-left: 4px; }

    .meter-row { display: flex; flex-direction: column; gap: 4px; }
    .meter-label { display: flex; justify-content: space-between; font-size: 0.72rem; color: var(--muted); }
    .meter-value { color: var(--text); font-weight: 600; font-family: monospace; }
    .meter-track { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .meter-fill { height: 100%; border-radius: 3px; transition: width .5s ease; }
    .upset-warning { font-size: 0.72rem; color: var(--danger); margin-top: 2px; font-weight: 500; }

    .source-detail {
      display: grid;
      grid-template-columns: auto 1fr 1fr;
      gap: 2px 12px;
      font-size: 0.72rem;
      background: var(--bg);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transition: max-height .25s ease, opacity .2s ease, padding .25s ease;
      padding: 0 10px;
    }
    .source-detail.expanded {
      max-height: 140px;
      opacity: 1;
      padding: 8px 10px;
    }
    .source-detail-hdr { color: var(--muted); font-weight: 600; font-size: 0.65rem; text-transform: uppercase; letter-spacing: .05em; }
    .source-detail-val { font-family: monospace; color: var(--text); }
    .source-detail-na { color: var(--muted); font-style: italic; }
    .source-toggle {
      font-size: 0.68rem;
      color: var(--accent);
      cursor: pointer;
      background: none;
      border: none;
      padding: 2px 0;
      transition: color .15s;
    }
    .source-toggle:hover { color: var(--text); }

    .disagree-row { display: flex; align-items: center; justify-content: space-between; font-size: 0.72rem; color: var(--muted); padding-top: 8px; border-top: 1px solid var(--border); }
    .disagree-level { font-weight: 600; }
    .disagree-low  { color: var(--accent); }
    .disagree-med  { color: var(--warn); }
    .disagree-high { color: var(--danger); }
    .disagree-na   { color: var(--muted); }
    .source-tags { display: flex; gap: 4px; flex-wrap: wrap; }
    .source-tag { font-size: 0.65rem; padding: 1px 5px; background: var(--bg); border: 1px solid var(--border); border-radius: 3px; color: var(--muted); transition: border-color .15s; }
    .source-tag-ok  { border-color: var(--accent); color: var(--accent); }
    .source-tag-err { border-color: var(--danger); color: var(--danger); opacity: 0.7; }

    .loading-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; gap: 16px; color: var(--muted); }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 0.9rem; }
    .empty-state { padding: 40px 20px; text-align: center; color: var(--muted); font-size: 0.88rem; grid-column: 1 / -1; }

    .test-indicator {
      position: fixed;
      bottom: 12px;
      right: 12px;
      font-size: 0.68rem;
      padding: 4px 10px;
      border-radius: var(--radius-sm);
      z-index: 100;
      font-family: monospace;
      opacity: 0.7;
      transition: opacity .2s;
      cursor: default;
    }
    .test-indicator:hover { opacity: 1; }
    .test-pass { background: rgba(16,185,129,0.15); color: var(--accent); border: 1px solid var(--accent); }
    .test-fail { background: rgba(239,68,68,0.15); color: var(--danger); border: 1px solid var(--danger); }

    @media (max-width: 600px) {
      .summary-strip { grid-template-columns: 1fr; }
      .fight-grid { grid-template-columns: 1fr; }
      .key-panel { flex-direction: column; align-items: flex-start; }
      .key-panel input { width: 100%; }
      .header-meta { width: 100%; justify-content: flex-start; }
    }
    @media (max-width: 400px) {
      .page { padding: 0 10px 48px; }
      .fight-card { padding: 12px; }
    }
    .btn, .key-panel input, button { min-height: 44px; }
    @media (min-width: 601px) {
      .btn, button { min-height: 32px; }
      .key-panel input { min-height: 32px; }
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="page">
  <header>
    <div>
      <span class="logo">UFC Odds Risk Intel<span class="logo-sub">Dashboard</span></span>
    </div>
    <div class="header-meta">
      <span class="last-updated hidden" id="lastUpdated"></span>
      <button class="btn" id="refreshBtn" type="button" aria-label="Refresh odds data">Refresh</button>
    </div>
  </header>

  <div class="key-panel" role="group" aria-label="API key configuration">
    <div>
      <label for="apiKeyInput">The Odds API Key <span style="color:var(--muted)">(optional)</span></label>
      <input type="password" id="apiKeyInput" placeholder="Paste your API key..." autocomplete="off" spellcheck="false" maxlength="200">
      <div class="key-hint">Stored in localStorage only, never sent anywhere except the-odds-api.com.</div>
      <div class="key-status hidden" id="keyStatus"></div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
      <button class="btn btn-accent" id="applyKeyBtn" type="button">Apply Key</button>
      <button class="btn btn-danger hidden" id="clearKeyBtn" type="button">Clear API Key</button>
    </div>
  </div>

  <div id="banners" role="status" aria-live="polite"></div>

  <div class="summary-strip">
    <div class="summary-card">
      <div class="summary-title">Safest Bets</div>
      <div class="loading-state" id="safestLoading" style="padding:20px 0;">
        <div class="spinner" style="width:18px;height:18px;border-width:2px;"></div>
      </div>
      <ul class="summary-list hidden" id="safestList" role="list" aria-label="Safest bets"></ul>
      <p class="summary-empty hidden" id="safestEmpty">No lock-tier fights found.</p>
    </div>
    <div class="summary-card">
      <div class="summary-title">Upset Watch</div>
      <div class="loading-state" id="upsetLoading" style="padding:20px 0;">
        <div class="spinner" style="width:18px;height:18px;border-width:2px;"></div>
      </div>
      <ul class="summary-list hidden" id="upsetList" role="list" aria-label="Upset watch"></ul>
      <p class="summary-empty hidden" id="upsetEmpty">No high-upset-potential fights found.</p>
    </div>
  </div>

  <div class="section-header">
    <span class="section-title">Fight Cards</span>
    <span class="count-badge hidden" id="fightCount"></span>
  </div>
  <div id="fightGrid" class="fight-grid" role="list" aria-label="Fight cards">
    <div class="loading-state" id="mainLoading" style="grid-column:1/-1;">
      <div class="spinner"></div>
      <span class="loading-text">Fetching live odds...</span>
    </div>
  </div>
</div>

<script>
'use strict';

// -----------------------------------------------
// CONSTANTS
// -----------------------------------------------
const CACHE_VERSION    = 'v1';
const CACHE_TTL_MS     = 15 * 60 * 1000;
const FETCH_TIMEOUT_MS = 8000;
const POLY_CACHE_KEY   = 'pattaya-poly-v1';
const ODDS_CACHE_KEY   = 'pattaya-odds-v1';
const ODDS_API_LS_KEY  = 'pattaya-odds-api-key';
const PROB_SUM_MAX     = 0.10;
const QUOTA_WARN       = 50;
const POLY_BASE        = 'https://clob.polymarket.com';
const ODDS_BASE        = 'https://api.the-odds-api.com/v4/sports/mma_mixed_martial_arts/odds';

const TIER = Object.freeze({
  LOCK: 'lock',
  LEAN: 'lean',
  TOSSUP: 'tossup',
  UPSET: 'upset',
});

// Disagreement thresholds per spec: <3% strong consensus, 3-8% some, >8% significant
const DISAGREE_LOW  = 0.03;
const DISAGREE_HIGH = 0.08;

// -----------------------------------------------
// SAFE GUARDS
// -----------------------------------------------
function safeNum(v) {
  return (typeof v === 'number' && isFinite(v)) ? v : null;
}

function safeStr(v) {
  if (typeof v !== 'string') return null;
  const s = v.trim();
  return s.length ? s : null;
}

function clamp(v, lo, hi) {
  const n = safeNum(v);
  return n === null ? lo : Math.max(lo, Math.min(hi, n));
}

function sanitize(s) {
  if (typeof s !== 'string') return 'Unknown';
  return s.replace(/[\x00-\x1f\x7f]/g, '').trim().slice(0, 100) || 'Unknown';
}

// -----------------------------------------------
// CACHE
// -----------------------------------------------
const cache = (() => {
  let avail = null;

  function ok() {
    if (avail !== null) return avail;
    try {
      sessionStorage.setItem('__p', '1');
      sessionStorage.removeItem('__p');
      avail = true;
    } catch (_) {
      avail = false;
    }
    return avail;
  }

  function write(key, data) {
    if (!ok()) return;
    try {
      sessionStorage.setItem(key, JSON.stringify({
        version: CACHE_VERSION, ts: Date.now(), data,
      }));
    } catch (_) {}
  }

  function read(key) {
    if (!ok()) return null;
    let raw;
    try { raw = sessionStorage.getItem(key); } catch (_) { return null; }
    if (!raw) return null;
    let entry;
    try { entry = JSON.parse(raw); } catch (_) {
      try { sessionStorage.removeItem(key); } catch (_) {}
      return null;
    }
    if (!entry || typeof entry !== 'object' || entry.version !== CACHE_VERSION) {
      try { sessionStorage.removeItem(key); } catch (_) {}
      return null;
    }
    const ts = safeNum(entry.ts);
    const now = Date.now();
    if (ts === null || ts > now || now - ts > CACHE_TTL_MS) {
      try { sessionStorage.removeItem(key); } catch (_) {}
      return null;
    }
    return entry.data ?? null;
  }

  function remove(key) {
    if (!ok()) return;
    try { sessionStorage.removeItem(key); } catch (_) {}
  }

  function clearAll() { remove(POLY_CACHE_KEY); remove(ODDS_CACHE_KEY); }

  return { write, read, remove, clearAll };
})();

// -----------------------------------------------
// VALIDATORS
// -----------------------------------------------
function validatePolymarket(raw) {
  if (!raw || typeof raw !== 'object' || !Array.isArray(raw.data)) return null;
  const fights = [];
  for (const item of raw.data) {
    if (!item || typeof item !== 'object') continue;
    if (!Array.isArray(item.outcomes) || item.outcomes.length < 2) continue;
    if (!Array.isArray(item.outcomePrices) || item.outcomePrices.length < 2) continue;
    const f1 = safeStr(item.outcomes[0]);
    const f2 = safeStr(item.outcomes[1]);
    if (!f1 || !f2) continue;
    const p1r = parseFloat(item.outcomePrices[0]);
    const p2r = parseFloat(item.outcomePrices[1]);
    if (!isFinite(p1r) || !isFinite(p2r) || p1r < 0 || p1r > 1 || p2r < 0 || p2r > 1) continue;
    const sum = p1r + p2r;
    const dev = Math.abs(sum - 1);
    if (dev > PROB_SUM_MAX) continue;
    const n = dev > 0 ? sum : 1;
    const id = safeStr(item.conditionId || item.id || '') || ('poly-' + fights.length);
    fights.push({
      id, f1: sanitize(f1), f2: sanitize(f2),
      polyP1: clamp(p1r / n, 0, 1), polyP2: clamp(p2r / n, 0, 1),
    });
  }
  return fights;
}

function americanToImplied(a) {
  const n = safeNum(a);
  if (n === null || n === 0) return null;
  return n > 0 ? 100 / (n + 100) : Math.abs(n) / (Math.abs(n) + 100);
}

function impliedToAmerican(p) {
  if (p === null || p <= 0 || p >= 1) return null;
  if (p >= 0.5) return Math.round(-100 * p / (1 - p));
  return Math.round(100 * (1 - p) / p);
}

function validateOddsAPI(raw) {
  if (!Array.isArray(raw)) return null;
  const fights = [];
  for (const ev of raw) {
    if (!ev || typeof ev !== 'object') continue;
    const home = safeStr(ev.home_team);
    const away = safeStr(ev.away_team);
    if (!home || !away) continue;
    if (!Array.isArray(ev.bookmakers) || !ev.bookmakers.length) continue;

    let sh = 0, sa = 0, cnt = 0;
    const bookData = [];

    for (const bk of ev.bookmakers) {
      if (!bk || !Array.isArray(bk.markets)) continue;
      const bookName = safeStr(bk.key) || 'unknown';
      for (const mkt of bk.markets) {
        if (!mkt || mkt.key !== 'h2h' || !Array.isArray(mkt.outcomes) || mkt.outcomes.length < 2) continue;
        let hp = null, ap = null, hRaw = null, aRaw = null;
        for (const oc of mkt.outcomes) {
          if (!oc || typeof oc !== 'object') continue;
          const nm = safeStr(oc.name);
          const pr = safeNum(oc.price);
          if (!nm || pr === null) continue;
          if (nm === home) { hp = americanToImplied(pr); hRaw = pr; }
          else if (nm === away) { ap = americanToImplied(pr); aRaw = pr; }
        }
        if (hp === null || ap === null) continue;
        const s = hp + ap;
        const d = Math.abs(s - 1);
        if (d > PROB_SUM_MAX) continue;
        sh += hp / s; sa += ap / s; cnt++;
        bookData.push({ book: bookName, homeProb: hp / s, awayProb: ap / s, homeRaw: hRaw, awayRaw: aRaw });
      }
    }
    if (!cnt) continue;
    const id = safeStr(ev.id || '') || ('odds-' + fights.length);
    fights.push({
      id, f1: sanitize(home), f2: sanitize(away),
      oddsP1: clamp(sh / cnt, 0, 1), oddsP2: clamp(sa / cnt, 0, 1),
      bookData,
    });
  }
  return fights;
}

// -----------------------------------------------
// COMPUTE
// -----------------------------------------------
function wilsonCI(p, n) {
  if (n <= 0 || p < 0 || p > 1) return { lo: p, hi: p };
  const z = 1.96, z2 = z * z;
  const center = (p + z2 / (2 * n)) / (1 + z2 / n);
  const margin = (z / (1 + z2 / n)) * Math.sqrt((p * (1 - p) / n) + z2 / (4 * n * n));
  return { lo: clamp(center - margin, 0, 1), hi: clamp(center + margin, 0, 1) };
}

function riskTier(p) {
  if (p >= 0.75) return TIER.LOCK;
  if (p >= 0.60) return TIER.LEAN;
  if (p >= 0.45) return TIER.TOSSUP;
  return TIER.UPSET;
}

function upsetScore(underdogProb, ciWidth, disagreeLevel) {
  const closeness = 1 - Math.abs(0.5 - underdogProb) * 2;
  const ciPenalty = clamp(ciWidth * 4, 0, 1);
  const disagreePenalty = disagreeLevel === 'high' ? 0.3 : disagreeLevel === 'med' ? 0.15 : 0;
  const raw = (closeness * 0.6 + ciPenalty * 0.25 + disagreePenalty) * 100;
  return clamp(Math.round(raw), 0, 100);
}

function disagreement(a, b) {
  if (a === null || b === null) return { level: 'na', delta: null };
  const d = Math.abs(a - b);
  const level = d < DISAGREE_LOW ? 'low' : d < DISAGREE_HIGH ? 'med' : 'high';
  return { level, delta: d };
}

function computeFight(f) {
  const probs = [];
  if (f.polyP1 != null) probs.push(f.polyP1);
  if (f.oddsP1 != null) probs.push(f.oddsP1);
  if (!probs.length) return null;

  const cP1 = probs.reduce((a, b) => a + b, 0) / probs.length;
  const cP2 = clamp(1 - cP1, 0, 1);
  const fav1 = cP1 >= cP2;
  const favP = fav1 ? cP1 : cP2;
  const dogP = fav1 ? cP2 : cP1;

  const ci = wilsonCI(favP, probs.length * 20);
  const ciWidth = ci.hi - ci.lo;
  const dis = disagreement(f.polyP1 ?? null, f.oddsP1 ?? null);

  let tier = riskTier(favP);
  if (tier !== TIER.UPSET && ci.lo < 0.50 && dis.level !== 'low') {
    tier = TIER.UPSET;
  }

  return {
    id: f.id, f1: f.f1, f2: f.f2,
    favName: fav1 ? f.f1 : f.f2,
    dogName: fav1 ? f.f2 : f.f1,
    favProb: favP, underdogProb: dogP,
    consensusP1: cP1, consensusP2: cP2,
    ci, tier,
    upset: upsetScore(dogP, ciWidth, dis.level),
    disagree: dis,
    sources: { poly: f.polyP1 != null, odds: f.oddsP1 != null },
    polyP1: f.polyP1 ?? null, polyP2: f.polyP2 ?? null,
    oddsP1: f.oddsP1 ?? null, oddsP2: f.oddsP2 ?? null,
    bookData: f.bookData || [],
    singleSource: probs.length === 1,
  };
}

// FETCH
// -----------------------------------------------
async function fetchPolymarket() {
  const cached = cache.read(POLY_CACHE_KEY);
  if (cached !== null) return { fights: cached, error: null, fromCache: true };
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), FETCH_TIMEOUT_MS);
  try {
    let resp;
    try {
      resp = await fetch(POLY_BASE + '/markets?tag_slug=ufc&active=true&limit=50', {
        signal: ctrl.signal, headers: { 'Accept': 'application/json' },
      });
    } catch (e) {
      return { fights: null, error: e?.name === 'AbortError' ? 'Polymarket timed out (>8s)' : 'Polymarket network error: ' + String(e?.message || e).slice(0, 120) };
    }
    if (!resp.ok) return { fights: null, error: 'Polymarket HTTP ' + resp.status };
    let body;
    try { body = await resp.json(); } catch (_) { return { fights: null, error: 'Polymarket: invalid JSON' }; }
    const fights = validatePolymarket(body);
    if (!fights) return { fights: null, error: 'Polymarket: unexpected response shape' };
    cache.write(POLY_CACHE_KEY, fights);
    return { fights, error: null, fromCache: false };
  } finally { clearTimeout(t); }
}

async function fetchOddsAPI(apiKey) {
  const key = typeof apiKey === 'string' ? apiKey.trim() : '';
  if (!key) return { fights: null, error: 'No API key', quotaRemaining: null };
  const cached = cache.read(ODDS_CACHE_KEY);
  if (cached !== null) return { fights: cached, error: null, quotaRemaining: null, fromCache: true };
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), FETCH_TIMEOUT_MS);
  try {
    const params = new URLSearchParams({ apiKey: key, regions: 'us', markets: 'h2h', bookmakers: 'draftkings,fanduel' });
    let resp;
    try {
      resp = await fetch(ODDS_BASE + '/?' + params, { signal: ctrl.signal, headers: { 'Accept': 'application/json' } });
    } catch (e) {
      return { fights: null, error: e?.name === 'AbortError' ? 'Odds API timed out (>8s)' : 'Odds API network error: ' + String(e?.message || e).slice(0, 120), quotaRemaining: null };
    }
    const qr = resp.headers.get('x-requests-remaining');
    const quota = qr !== null ? parseInt(qr, 10) : null;
    if (resp.status === 401 || resp.status === 403) return { fights: null, error: 'Odds API: Invalid or unauthorized key', quotaRemaining: quota };
    if (resp.status === 422) return { fights: null, error: 'Odds API: Quota exceeded', quotaRemaining: 0 };
    if (!resp.ok) return { fights: null, error: 'Odds API HTTP ' + resp.status, quotaRemaining: quota };
    let body;
    try { body = await resp.json(); } catch (_) { return { fights: null, error: 'Odds API: invalid JSON', quotaRemaining: quota }; }
    const fights = validateOddsAPI(body);
    if (!fights) return { fights: null, error: 'Odds API: unexpected shape', quotaRemaining: quota };
    cache.write(ODDS_CACHE_KEY, fights);
    return { fights, error: null, quotaRemaining: quota, fromCache: false };
  } finally { clearTimeout(t); }
}

// -----------------------------------------------
// MERGE
// -----------------------------------------------
function lastName(n) {
  if (!n) return '';
  const parts = n.trim().split(/\s+/);
  return parts[parts.length - 1].toLowerCase();
}

function mergeResults(poly, odds) {
  if (!poly) return (odds || []).map(f => ({ ...f }));
  if (!odds) return poly.map(f => ({ ...f }));
  const used = new Set();
  const out = [];
  for (const pf of poly) {
    const pl1 = lastName(pf.f1), pl2 = lastName(pf.f2);
    let bestIdx = null;
    for (let i = 0; i < odds.length; i++) {
      if (used.has(i)) continue;
      const ol1 = lastName(odds[i].f1), ol2 = lastName(odds[i].f2);
      if ((ol1 === pl1 && ol2 === pl2) || (ol1 === pl2 && ol2 === pl1)) { bestIdx = i; break; }
    }
    if (bestIdx !== null) {
      used.add(bestIdx);
      out.push({ ...pf, oddsP1: odds[bestIdx].oddsP1, oddsP2: odds[bestIdx].oddsP2, bookData: odds[bestIdx].bookData || [] });
    } else {
      out.push({ ...pf, oddsP1: null, oddsP2: null, bookData: [] });
    }
  }
  for (let i = 0; i < odds.length; i++) {
    if (!used.has(i)) out.push({ ...odds[i], polyP1: null, polyP2: null });
  }
  return out;
}

function pct(p) { return Math.round(p * 100) + '%'; }

function fmtAmerican(odds) {
  if (odds === null) return '';

}

function makeBar(prob, tier) {

function makeCIBar(ci, favP, singleSource) {
  const row = document.createElement('div'); row.className = 'ci-row';

  const fill = document.createElement('div'); fill.className = 'ci-fill';

  fill.style.width = ((clamp(ci.hi, 0, 1) - clamp(ci.lo, 0, 1)) * 100) + '%';
  track.appendChild(fill);

  cn.style.left = 'calc(' + (clamp(favP, 0, 1) * 100) + '% - 1px)';

    fightGridEl.appendChild(em);

  fightCountEl.classList.remove('hidden');
  fightCountEl.textContent = computed.length + ' fight' + (computed.length !== 1 ? 's' : '');

}

function loadKey() {
  try { const k = localStorage.getItem(ODDS_API_LS_KEY); return typeof k === 'string' && k.trim() ? k.trim() : null; }
  catch (_) { return null; }
}
function saveKey(k) {
  const t = typeof k === 'string' ? k.trim() : '';
  if (!t) return false;
  try { localStorage.setItem(ODDS_API_LS_KEY, t); return true; } catch (_) { return false; }
}
function removeKey() { try { localStorage.removeItem(ODDS_API_LS_KEY); } catch (_) {} }

const apiKeyInput = $('apiKeyInput');
const applyKeyBtn = $('applyKeyBtn');
const clearKeyBtn = $('clearKeyBtn');
const refreshBtn  = $('refreshBtn');

function updateKeyUI() {
  const hasKey = !!loadKey();
  if (hasKey) {
    clearKeyBtn.classList.remove('hidden');
    apiKeyInput.placeholder = '\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022';
    apiKeyInput.value = '';
  } else {
    clearKeyBtn.classList.add('hidden');
    apiKeyInput.placeholder = 'Paste your API key...';
  }
  keyStatusEl.classList.remove('hidden');
  keyStatusEl.className = 'key-status ' + (hasKey ? 'key-status-active' : 'key-status-none');
  keyStatusEl.innerHTML = '<span class="key-status-dot"></span>' + (hasKey ? 'Key saved' : 'No key set');
}

// -----------------------------------------------
// MAIN ORCHESTRATION
// -----------------------------------------------
let isRunning = false;

async function run(force) {
  if (isRunning) return;
  isRunning = true;
  refreshBtn.disabled = true;
  refreshBtn.textContent = 'Loading...';

  clearBanners();
  fightGridEl.querySelectorAll('.fight-card,.empty-state').forEach(e => e.remove());
  mainLoadEl.classList.remove('hidden');
  safestLoadEl.classList.remove('hidden');
  safestListEl.classList.add('hidden'); safestEmptyEl.classList.add('hidden');
  upsetLoadEl.classList.remove('hidden');
  upsetListEl.classList.add('hidden'); upsetEmptyEl.classList.add('hidden');
  if (force) cache.clearAll();

  const apiKey = loadKey();
  if (!apiKey) addBanner('info', 'No Odds API key', 'Showing Polymarket data only. Add your key above for DraftKings/FanDuel odds.');

  try {
    const [polyRes, oddsRes] = await Promise.all([
      fetchPolymarket(),
      apiKey ? fetchOddsAPI(apiKey) : Promise.resolve({ fights: null, error: null, quotaRemaining: null }),
    ]);

    if (polyRes.error) addBanner('warn', 'Polymarket unavailable', polyRes.error);
    if (apiKey && oddsRes.error && oddsRes.error !== 'No API key') addBanner('warn', 'Odds API unavailable', oddsRes.error);
    const qr = oddsRes.quotaRemaining;
    if (qr !== null && isFinite(qr) && qr < QUOTA_WARN) addBanner('warn', 'Odds API quota low: ' + qr + ' requests remaining', 'Consider refreshing less frequently to preserve quota.');

    if (!polyRes.fights && !oddsRes.fights) { showAllFailed(); return; }

    const merged = mergeResults(polyRes.fights, oddsRes.fights);
    const computed = merged.map(computeFight).filter(Boolean);
    renderSummary(computed);
    renderFights(computed);

    const now = new Date();
    lastUpdEl.textContent = 'Updated ' + now.toLocaleTimeString();
    lastUpdEl.classList.remove('hidden');

    const cached = [];
    if (polyRes.fromCache) cached.push('Polymarket');
    if (oddsRes.fromCache) cached.push('Odds API');
    if (cached.length) addBanner('info', null, 'Using cached data: ' + cached.join(', ') + ' (15-min TTL). Click Refresh to force reload.');
  } finally {
    isRunning = false;
    refreshBtn.disabled = false;
    refreshBtn.textContent = 'Refresh';
  }
}

// -----------------------------------------------
// EVENT LISTENERS
// -----------------------------------------------
applyKeyBtn.addEventListener('click', () => {
  const v = apiKeyInput.value, t = typeof v === 'string' ? v.trim() : '';
  if (!t) { addBanner('warn', 'API key required', 'Enter a valid key before applying.'); return; }
  if (!saveKey(t)) { addBanner('danger', 'Could not save key', 'localStorage may be blocked in this browser.'); return; }
  apiKeyInput.value = '';
  updateKeyUI();
  cache.remove(ODDS_CACHE_KEY);
  run(false);
});

clearKeyBtn.addEventListener('click', () => {
  removeKey(); cache.clearAll(); apiKeyInput.value = ''; updateKeyUI();
  addBanner('info', 'API key cleared', 'Odds API data will no longer be fetched.');
  run(false);
});

refreshBtn.addEventListener('click', () => run(true));
apiKeyInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') applyKeyBtn.click(); });

// -----------------------------------------------
// INLINE TESTS
// -----------------------------------------------
function runTests() {
  const results = { passed: 0, failed: 0, errors: [] };

  function assert(cond, name) {
    if (cond) results.passed++;
    else { results.failed++; results.errors.push(name); }
  }

  // safeNum
  assert(safeNum(42) === 42, 'safeNum: valid');
  assert(safeNum(NaN) === null, 'safeNum: NaN');
  assert(safeNum(Infinity) === null, 'safeNum: Inf');
  assert(safeNum('5') === null, 'safeNum: string');
  assert(safeNum(null) === null, 'safeNum: null');

  // safeStr
  assert(safeStr('hello') === 'hello', 'safeStr: valid');
  assert(safeStr('  ') === null, 'safeStr: whitespace');
  assert(safeStr(42) === null, 'safeStr: number');
  assert(safeStr('') === null, 'safeStr: empty');

  // clamp
  assert(clamp(5, 0, 10) === 5, 'clamp: in range');
  assert(clamp(-1, 0, 10) === 0, 'clamp: below');
  assert(clamp(15, 0, 10) === 10, 'clamp: above');
  assert(clamp(NaN, 0, 10) === 0, 'clamp: NaN');

  // sanitize
  assert(sanitize('John Doe') === 'John Doe', 'sanitize: clean');
  assert(sanitize(42) === 'Unknown', 'sanitize: non-string');
  assert(sanitize('\x00evil\x1f') === 'evil', 'sanitize: control chars');
  assert(sanitize('') === 'Unknown', 'sanitize: empty');

  // americanToImplied
  assert(Math.abs(americanToImplied(-200) - 0.6667) < 0.001, 'a2i: -200');
  assert(Math.abs(americanToImplied(200) - 0.3333) < 0.001, 'a2i: +200');
  assert(americanToImplied(0) === null, 'a2i: zero');
  assert(americanToImplied(null) === null, 'a2i: null');

  // impliedToAmerican
  assert(impliedToAmerican(0.6667) < 0, 'i2a: fav negative');
  assert(impliedToAmerican(0.3333) > 0, 'i2a: dog positive');
  assert(impliedToAmerican(null) === null, 'i2a: null');
  assert(impliedToAmerican(0) === null, 'i2a: zero');
  assert(impliedToAmerican(1) === null, 'i2a: one');
  // Round-trip
  const rt = americanToImplied(impliedToAmerican(0.7));
  assert(rt !== null && Math.abs(rt - 0.7) < 0.02, 'i2a/a2i: round-trip');

  // wilsonCI
  const ci1 = wilsonCI(0.7, 40);
  assert(ci1.lo < 0.7 && ci1.hi > 0.7, 'wilson: brackets');
  assert(ci1.lo >= 0 && ci1.hi <= 1, 'wilson: bounds');
  const ci0 = wilsonCI(0.5, 0);
  assert(ci0.lo === 0.5 && ci0.hi === 0.5, 'wilson: n=0');

  // riskTier
  assert(riskTier(0.80) === TIER.LOCK, 'tier: Lock');
  assert(riskTier(0.75) === TIER.LOCK, 'tier: Lock edge');
  assert(riskTier(0.65) === TIER.LEAN, 'tier: Lean');
  assert(riskTier(0.60) === TIER.LEAN, 'tier: Lean edge');
  assert(riskTier(0.50) === TIER.TOSSUP, 'tier: Tossup');
  assert(riskTier(0.45) === TIER.TOSSUP, 'tier: Tossup edge');
  assert(riskTier(0.40) === TIER.UPSET, 'tier: Upset');

  // upsetScore
  assert(upsetScore(0.5, 0.1, 'low') > upsetScore(0.2, 0.05, 'low'), 'upset: closer=higher');
  assert(upsetScore(0.4, 0.2, 'high') > upsetScore(0.4, 0.05, 'low'), 'upset: disagree adds');
  assert(upsetScore(0, 0, 'low') >= 0, 'upset: non-neg');
  assert(upsetScore(0.5, 1, 'high') <= 100, 'upset: max 100');

  // disagreement (spec thresholds)
  assert(disagreement(0.7, 0.72).level === 'low', 'disagree: <3pp low');
  assert(disagreement(0.7, 0.75).level === 'med', 'disagree: 3-8pp med');
  assert(disagreement(0.7, 0.80).level === 'high', 'disagree: >8pp high');
  assert(disagreement(null, 0.7).level === 'na', 'disagree: null na');

  // computeFight
  const tf = { id: 'test', f1: 'Alice', f2: 'Bob', polyP1: 0.8, polyP2: 0.2, oddsP1: 0.75, oddsP2: 0.25 };
  const tc = computeFight(tf);
  assert(tc !== null, 'compute: non-null');
  assert(tc.favProb >= tc.underdogProb, 'compute: fav>=dog');
  assert(Math.abs(tc.favProb + tc.underdogProb - 1) < 0.001, 'compute: sum=1');
  assert(tc.tier === TIER.LOCK, 'compute: Lock tier');
  assert(tc.sources.poly && tc.sources.odds, 'compute: sources');
  assert(tc.singleSource === false, 'compute: multi-source');
  assert(computeFight({ id: 'x', f1: 'A', f2: 'B' }) === null, 'compute: no data=null');

  // Single source flag
  const sf = computeFight({ id: 'y', f1: 'C', f2: 'D', polyP1: 0.6, polyP2: 0.4 });
  assert(sf !== null && sf.singleSource === true, 'compute: single source');

  // mergeResults
  const p = [{ id: '1', f1: 'John Smith', f2: 'Jane Doe', polyP1: 0.6, polyP2: 0.4 }];
  const o = [{ id: '2', f1: 'John Smith', f2: 'Jane Doe', oddsP1: 0.55, oddsP2: 0.45 }];
  const merged = mergeResults(p, o);
  assert(merged.length === 1, 'merge: matched');
  assert(merged[0].polyP1 === 0.6 && merged[0].oddsP1 === 0.55, 'merge: probs');
  assert(mergeResults(null, o).length === 1, 'merge: null poly');
  assert(mergeResults(p, null).length === 1, 'merge: null odds');

  // lastName
  assert(lastName('Conor McGregor') === 'mcgregor', 'lastName: multi');
  assert(lastName('Ngannou') === 'ngannou', 'lastName: single');
  assert(lastName('') === '', 'lastName: empty');

  // Validators
  assert(validatePolymarket(null) === null, 'valPoly: null');
  assert(validatePolymarket({}) === null, 'valPoly: no data');
  assert(validatePolymarket({ data: 'bad' }) === null, 'valPoly: non-array');
  assert(validateOddsAPI(null) === null, 'valOdds: null');
  assert(validateOddsAPI('bad') === null, 'valOdds: non-array');

  // Render indicator
  const indicator = document.createElement('div');
  indicator.className = 'test-indicator ' + (results.failed === 0 ? 'test-pass' : 'test-fail');
  indicator.textContent = results.failed === 0
    ? results.passed + '/' + results.passed + ' tests pass'
    : results.failed + ' FAILED: ' + results.errors.join(', ');
  indicator.title = results.passed + ' passed, ' + results.failed + ' failed';
  document.body.appendChild(indicator);

  if (results.failed > 0) console.error('TESTS FAILED:', results.errors);
  return results;
}

// -----------------------------------------------
// INIT
// -----------------------------------------------
document.addEventListener('DOMContentLoaded', () => {
  updateKeyUI();
  runTests();
  run(false);
});
</script>
