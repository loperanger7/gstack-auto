<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src https://clob.polymarket.com https://api.the-odds-api.com; img-src 'none'; font-src 'none'; frame-src 'none'; object-src 'none'; base-uri 'self'">
  <title>UFC Odds Risk Intel Dashboard</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #10b981;
      --accent-dim: #059669;
      --accent-glow: rgba(16,185,129,0.15);
      --warn: #f59e0b;
      --danger: #ef4444;
      --info: #3b82f6;
      --lock: #10b981;
      --lean: #3b82f6;
      --tossup: #f59e0b;
      --upset: #ef4444;
      --fav-color: #10b981;
      --dog-color: #f97316;
      --radius: 8px;
      --radius-sm: 4px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 15px; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      line-height: 1.5;
      min-height: 100vh;
      font-feature-settings: 'tnum' 1;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Layout */
    .page { max-width: 1100px; margin: 0 auto; padding: 0 16px 64px; }
    header {
      padding: 20px 0 16px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .logo { font-size: 1.3rem; font-weight: 700; color: var(--accent); letter-spacing: -0.02em; }
    .logo-sub { font-size: 0.8rem; color: var(--muted); font-weight: 400; margin-left: 4px; }
    .header-meta { margin-left: auto; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .last-updated { font-size: 0.75rem; color: var(--muted); transition: opacity .3s; }
    .quota-badge {
      font-size: 0.7rem; padding: 2px 8px; border-radius: 20px; font-weight: 600;
      border: 1px solid var(--border); color: var(--muted); background: var(--surface);
      transition: color .3s, border-color .3s;
    }
    .quota-ok { border-color: var(--accent); color: var(--accent); }
    .quota-low { border-color: var(--warn); color: var(--warn); }
    .quota-critical { border-color: var(--danger); color: var(--danger); }
    .btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 14px;
      border-radius: var(--radius-sm);
      font-size: 0.8rem;
      cursor: pointer;
      transition: border-color .15s, background .15s, transform .1s;
    }
    .btn:hover { border-color: var(--accent); background: var(--accent-glow); }
    .btn:active { opacity: 0.85; }
    .btn-accent { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
    .btn-accent:hover { background: var(--accent-dim); border-color: var(--accent-dim); }
    .btn-danger { border-color: var(--danger); color: var(--danger); }
    .btn-danger:hover { background: rgba(239,68,68,0.1); }
    .btn[disabled] { opacity: 0.5; cursor: not-allowed; pointer-events: none; }

    /* API Key Panel */
    .key-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 16px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-wrap: wrap;
      transition: border-color .2s;
    }
    .key-panel:focus-within { border-color: var(--accent); }
    .key-panel label { font-size: 0.8rem; color: var(--muted); display: block; margin-bottom: 4px; }
    .key-panel input {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 10px;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      width: 260px;
      max-width: 100%;
      font-family: monospace;
      transition: border-color .15s, box-shadow .15s;
    }
    .key-panel input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }
    .key-hint { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }

    /* Banners */
    .banner {
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-size: 0.83rem;
      margin-bottom: 10px;
      border-left: 3px solid transparent;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      animation: bannerIn .25s ease-out;
      transition: opacity .3s, transform .3s;
    }
    @keyframes bannerIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }
    .banner-dismiss { opacity: 0; transform: translateY(-6px); }
    .banner-warn   { background: rgba(245,158,11,0.08); border-color: var(--warn);   color: var(--warn);   }
    .banner-danger { background: rgba(239,68,68,0.08);  border-color: var(--danger); color: var(--danger); }
    .banner-info   { background: rgba(59,130,246,0.08); border-color: var(--info);   color: var(--info);   }
    .banner-success{ background: var(--accent-glow);    border-color: var(--accent); color: var(--accent); }
    .banner-icon { flex-shrink: 0; font-size: 0.95rem; margin-top: 0.05em; }
    .banner-body { flex: 1; }
    .banner-title { font-weight: 600; margin-bottom: 2px; }
    .banner-close {
      flex-shrink: 0; background: none; border: none; color: inherit; cursor: pointer;
      font-size: 1rem; line-height: 1; padding: 0 2px; opacity: 0.6;
      transition: opacity .15s;
    }
    .banner-close:hover { opacity: 1; }
    #banners { margin-bottom: 8px; }

    /* Fight Spotlight */
    .spotlight-section { margin-bottom: 20px; }
    .spotlight-card {
      background: var(--surface);
      border: 2px solid var(--accent);
      border-radius: var(--radius);
      padding: 20px 24px;
      position: relative;
    }
    .spotlight-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
      font-weight: 700;
      margin-bottom: 8px;
    }
    .spotlight-matchup {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .spotlight-reason {
      font-size: 0.8rem;
      color: var(--muted);
    }
    .spotlight-stats {
      display: flex;
      gap: 20px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .spotlight-stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .spotlight-stat-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
    }
    .spotlight-stat-value {
      font-size: 1.1rem;
      font-weight: 700;
      font-family: 'SF Mono', SFMono-Regular, Consolas, monospace;
    }
    /* Removed: spotlightPulse — decorative animation with no functional purpose */

    /* Summary strip */
    .summary-strip { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
    .summary-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px;
      transition: border-color .2s;
    }
    .summary-card:hover { border-color: var(--muted); }
    .summary-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 10px; font-weight: 600; }
    .summary-empty { color: var(--muted); font-size: 0.82rem; font-style: italic; }
    .summary-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .summary-item {
      display: flex; align-items: center; gap: 8px; font-size: 0.82rem;
      padding: 3px 6px; border-radius: var(--radius-sm);
      transition: background .15s;
    }
    .summary-item:hover { background: rgba(255,255,255,0.03); }
    .summary-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .summary-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .summary-vs { color: var(--muted); font-size: 0.72rem; flex-shrink: 0; margin-right: 2px; }
    .summary-prob { color: var(--muted); font-size: 0.75rem; margin-left: auto; flex-shrink: 0; }

    /* Section header */
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
    .section-title { font-size: 1rem; font-weight: 600; color: var(--text); }
    .count-badge { background: var(--accent-glow); border: 1px solid var(--accent); color: var(--accent); font-size: 0.7rem; padding: 2px 8px; border-radius: 20px; font-weight: 600; }

    /* Event group header */
    .event-group-header {
      grid-column: 1 / -1;
      padding: 8px 0 4px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .event-group-name {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .event-group-count {
      font-size: 0.65rem;
      color: var(--muted);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1px 6px;
    }

    /* Fight Grid */
    .fight-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
    .fight-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: border-color .2s, box-shadow .2s, transform .15s;
      opacity: 0;
      animation: cardEnter 0.2s ease-out forwards;
      position: relative;
    }
    .fight-card:hover { border-color: var(--muted); }
    .fight-card[data-tier="lock"]   { border-left: 3px solid var(--lock); }
    .fight-card[data-tier="lean"]   { border-left: 3px solid var(--lean); }
    .fight-card[data-tier="tossup"] { border-left: 3px solid var(--tossup); }
    .fight-card[data-tier="upset"]  { border-left: 3px solid var(--upset); }

    /* Uniform hover — functional feedback, not decoration */
    .fight-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.2); }

    /* Focus ring for keyboard nav */
    .fight-card:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    .fight-card:focus { outline: none; }

    @keyframes cardEnter {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .fight-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
    .tier-badge {
      font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: .07em;
      padding: 3px 7px; border-radius: 3px; flex-shrink: 0;
    }
    .tier-lock   { background: rgba(16,185,129,0.15); color: var(--lock); }
    .tier-lean   { background: rgba(59,130,246,0.15);  color: var(--lean); }
    .tier-tossup { background: rgba(245,158,11,0.15);  color: var(--tossup); }
    .tier-upset  { background: rgba(239,68,68,0.15);   color: var(--upset); }

    .fight-matchup { flex: 1; }
    .fighter-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .fighter-name { font-size: 0.9rem; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 160px; }
    .fighter-name-fav { color: var(--fav-color); font-weight: 700; }
    .fighter-name-dog { color: var(--dog-color); font-weight: 500; }
    .fighter-name-even { color: var(--muted); font-weight: 500; }
    .fighter-prob { margin-left: auto; font-size: 0.85rem; font-weight: 700; color: var(--accent); flex-shrink: 0; }
    .fighter-odds { margin-left: 6px; font-size: 0.72rem; color: var(--muted); flex-shrink: 0; font-weight: 500; }
    .vs-divider { font-size: 0.65rem; color: var(--muted); padding: 0 4px; }

    .prob-bar-wrap { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin-bottom: 6px; }
    .prob-bar-fill { height: 100%; border-radius: 2px; background: var(--accent); transition: width .5s ease; }

    .ci-row { display: flex; align-items: center; gap: 6px; font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
    .ci-track { flex: 1; height: 6px; background: var(--border); border-radius: 3px; position: relative; overflow: visible; }
    .ci-fill { position: absolute; height: 100%; background: rgba(16,185,129,0.35); border-radius: 3px; transition: left .4s, width .4s; }
    .ci-center { position: absolute; width: 2px; height: 10px; top: -2px; background: var(--accent); border-radius: 1px; transition: left .4s; }

    .meter-row { display: flex; flex-direction: column; gap: 4px; }
    .meter-label { display: flex; justify-content: space-between; font-size: 0.72rem; color: var(--muted); }
    .meter-value { color: var(--text); font-weight: 600; }
    .meter-track { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .meter-fill { height: 100%; border-radius: 3px; transition: width .5s ease; }

    /* CSS-based upset warning indicator */
    .upset-warning {
      font-size: 0.72rem;
      color: var(--danger);
      font-weight: 600;
      margin-top: 2px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .upset-warning-icon {
      display: inline-block;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--danger);
      position: relative;
      flex-shrink: 0;
    }
    .upset-warning-icon::before {
      content: '!';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-size: 10px;
      font-weight: 800;
      line-height: 1;
    }
    /* Removed: pulse keyframe — static indicator is clearer (Rams: don't animate to distract) */

    /* Source detail popover */
    .disagree-row { display: flex; align-items: center; justify-content: space-between; font-size: 0.72rem; color: var(--muted); padding-top: 8px; border-top: 1px solid var(--border); cursor: pointer; position: relative; }
    .disagree-level { font-weight: 600; }
    .disagree-low  { color: var(--accent); }
    .disagree-med  { color: var(--warn); }
    .disagree-high { color: var(--danger); }
    .disagree-na   { color: var(--muted); }
    .source-tags { display: flex; gap: 4px; flex-wrap: wrap; }
    .source-tag {
      font-size: 0.65rem; padding: 1px 5px; background: var(--bg); border: 1px solid var(--border);
      border-radius: 3px; color: var(--muted); transition: border-color .15s, color .15s;
    }
    .source-tag-ok  { border-color: var(--accent); color: var(--accent); }
    .source-tag-err { border-color: var(--danger); color: var(--danger); opacity: 0.7; }

    .source-popover {
      display: none;
      position: absolute;
      bottom: calc(100% + 6px);
      left: 0;
      right: 0;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      font-size: 0.72rem;
      z-index: 20;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      animation: popoverIn 0.15s ease-out;
    }
    .source-popover.visible { display: block; }
    @keyframes popoverIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
    .source-popover-row {
      display: flex;
      justify-content: space-between;
      padding: 3px 0;
      border-bottom: 1px solid var(--border);
    }
    .source-popover-row:last-child { border-bottom: none; }
    .source-popover-name { color: var(--muted); }
    .source-popover-value { font-weight: 600; font-family: 'SF Mono', SFMono-Regular, Consolas, monospace; }
    .source-popover-note { color: var(--muted); font-style: italic; font-size: 0.65rem; margin-top: 4px; }

    /* Focus-within shows popover for keyboard users */
    .disagree-row:focus-within .source-popover { display: block; }

    .loading-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; gap: 16px; color: var(--muted); }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 0.9rem; }
    .empty-state { padding: 40px 20px; text-align: center; color: var(--muted); font-size: 0.88rem; grid-column: 1 / -1; }

    /* Skeleton shimmer loading */
    .skeleton-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; }
    .skeleton-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .skeleton-line {
      height: 12px;
      border-radius: 4px;
      background: linear-gradient(90deg, var(--border) 25%, rgba(48,54,61,0.6) 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s ease-in-out infinite;
    }
    .skeleton-line-wide { width: 80%; }
    .skeleton-line-med { width: 60%; }
    .skeleton-line-short { width: 40%; }
    .skeleton-line-bar { height: 6px; width: 100%; margin-top: 4px; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* Self-test footer */
    .selftest-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--surface); border-top: 1px solid var(--border);
      padding: 6px 16px; font-size: 0.7rem; color: var(--muted);
      display: flex; align-items: center; gap: 8px; z-index: 100;
    }
    .selftest-pass { color: var(--accent); }
    .selftest-fail { color: var(--danger); font-weight: 600; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
      .fight-card { opacity: 1; }
    }

    /* Responsive */
    @media (max-width: 600px) {
      .summary-strip { grid-template-columns: 1fr; }
      .fight-grid { grid-template-columns: 1fr; }
      .skeleton-grid { grid-template-columns: 1fr; }
      .key-panel { flex-direction: column; align-items: flex-start; }
      .key-panel input { width: 100%; }
      .header-meta { width: 100%; justify-content: flex-start; }
    }
    @media (max-width: 400px) {
      .page { padding: 0 10px 48px; }
      .fight-card { padding: 12px; }
    }
    .btn, .key-panel input, button { min-height: 44px; }
    @media (min-width: 601px) {
      .btn, button { min-height: 32px; }
      .key-panel input { min-height: 32px; }
    }
    .hidden { display: none !important; }
    .skip-to-content {
      position: absolute; left: -9999px; top: auto; width: 1px; height: 1px; overflow: hidden;
      background: var(--accent); color: var(--bg); padding: 8px 16px; border-radius: var(--radius);
      z-index: 1000; font-weight: 600; text-decoration: none;
    }
    .skip-to-content:focus { position: fixed; left: 16px; top: 16px; width: auto; height: auto; }
  </style>
</head>
<body>
<a href="#fightGrid" class="skip-to-content" tabindex="1">Skip to fights</a>
<div class="page">
  <header>
    <div>
      <span class="logo">UFC Odds Risk Intel<span class="logo-sub">Dashboard</span></span>
    </div>
    <div class="header-meta">
      <span class="quota-badge hidden" id="quotaBadge" title="Odds API requests remaining"></span>
      <span class="last-updated hidden" id="lastUpdated"></span>
      <button class="btn" id="refreshBtn" type="button">Refresh</button>
    </div>
  </header>

  <div class="key-panel">
    <div>
      <label for="apiKeyInput">The Odds API Key <span style="color:var(--muted)">(optional)</span></label>
      <input type="password" id="apiKeyInput" placeholder="Paste your API key..." autocomplete="new-password" spellcheck="false" maxlength="200">
      <div class="key-hint">Stored in localStorage only, never logged. Without it, Polymarket data only.</div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
      <button class="btn btn-accent" id="applyKeyBtn" type="button">Apply Key</button>
      <button class="btn btn-danger hidden" id="clearKeyBtn" type="button">Clear API Key</button>
    </div>
  </div>

  <div id="banners" role="status" aria-live="polite"></div>

  <div id="spotlightSection" class="spotlight-section hidden" aria-label="Fight Spotlight"></div>

  <main>
  <div class="summary-strip">
    <div class="summary-card">
      <div class="summary-title">Safest Bets</div>
      <div class="loading-state" id="safestLoading" style="padding:20px 0;">
        <div class="spinner" style="width:18px;height:18px;border-width:2px;"></div>
      </div>
      <ul class="summary-list hidden" id="safestList" role="list"></ul>
      <p class="summary-empty hidden" id="safestEmpty">No lock-tier fights found.</p>
    </div>
    <div class="summary-card">
      <div class="summary-title">Upset Watch</div>
      <div class="loading-state" id="upsetLoading" style="padding:20px 0;">
        <div class="spinner" style="width:18px;height:18px;border-width:2px;"></div>
      </div>
      <ul class="summary-list hidden" id="upsetList" role="list"></ul>
      <p class="summary-empty hidden" id="upsetEmpty">No high-upset-potential fights found.</p>
    </div>
  </div>

  <div class="section-header">
    <span class="section-title">Fight Cards</span>
    <span class="count-badge hidden" id="fightCount"></span>
  </div>
  <div id="fightGrid" class="fight-grid" role="list">

    </div>

  <div id="skeletonGrid" class="skeleton-grid" style="grid-column:1/-1;"></div>
  </main>
</div>

<script>
'use strict';

// ===================================================
// CONSTANTS
// ===================================================
var CACHE_VERSION      = 'v2';
var CACHE_TTL_MS       = 15 * 60 * 1000;
var FETCH_TIMEOUT_MS   = 8000;
var POLY_CACHE_KEY     = 'pattaya-poly-v2';
var ODDS_CACHE_KEY     = 'pattaya-odds-v2';
var ODDS_API_LS_KEY    = 'pattaya-odds-api-key';
var PROB_SUM_MAX       = 0.10;
var QUOTA_WARN         = 50;
var QUOTA_CRITICAL     = 10;
var POLY_BASE          = 'https://clob.polymarket.com';
var ODDS_BASE          = 'https://api.the-odds-api.com/v4/sports/mma_mixed_martial_arts/odds';
var TIER               = { LOCK:'lock', LEAN:'lean', TOSSUP:'tossup', UPSET:'upset' };
var BANNER_AUTO_DISMISS_MS = 12000;
var POLY_MAX_PAGES     = 3;
var POLY_PAGE_SIZE     = 50;

// Spec-exact thresholds
var DISAGREE_LOW_MAX   = 0.03;  // <3% = Strong Consensus
var DISAGREE_MED_MAX   = 0.08;  // 3-8% = Some Disagreement
                                 // >8% = Books Disagree Significantly

var TIER_LOCK_MIN      = 0.75;  // >=75% = Lock
var TIER_LEAN_MIN      = 0.60;  // 60-74% = Lean
var TIER_TOSSUP_MIN    = 0.45;  // 45-59% = Toss-Up
                                 // <45% = Upset Alert

var UPSET_WARN_THRESHOLD = 50;  // meter >=50 shows underdog warning

// Touch detection
var IS_TOUCH = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

// API key format validation
function validateApiKeyFormat(key) {
  if (!key || typeof key !== 'string') return false;
  var trimmed = key.trim();
  return trimmed.length >= 8 && trimmed.length <= 128 && /^[a-zA-Z0-9_\-]+$/.test(trimmed);
}

// AbortController for request lifecycle
var _activeController = null;

// ===================================================
// SAFE GUARDS
// ===================================================
function safeNum(v)  { return (typeof v === 'number' && isFinite(v)) ? v : null; }
function safeStr(v)  { if (typeof v !== 'string') return null; var s=v.trim(); return s.length?s:null; }
function clamp(v,lo,hi){ var n=safeNum(v); return n===null?lo:Math.max(lo,Math.min(hi,n)); }
function sanitize(s) { if(typeof s!=='string')return'Unknown'; return s.replace(/[\x00-\x1f\x7f]/g,'').trim().slice(0,100)||'Unknown'; }

// ===================================================
// CACHE
// ===================================================
// djb2 hash for cache integrity
function djb2(str) {
  var hash = 5381;
  for (var i = 0; i < str.length; i++) {
    hash = ((hash << 5) + hash) + str.charCodeAt(i);
    hash = hash & hash; // Convert to 32-bit integer
  }
  return hash >>> 0; // Unsigned
}

var cache = (function() {
  var avail = null;
  function ok() {
    if (avail !== null) return avail;
    try { sessionStorage.setItem('__p','1'); sessionStorage.removeItem('__p'); avail=true; }
    catch(e){ avail=false; }
    return avail;
  }
  function write(key, data) {
    if (!ok()) return;
    var json = JSON.stringify(data);
    var hash = djb2(json);
    try {
      sessionStorage.setItem(key, JSON.stringify({ version:CACHE_VERSION, ts:Date.now(), data:data, hash:hash }));
    } catch(e) {
      // QuotaExceededError — clear and retry once
      try { clearAll(); sessionStorage.setItem(key, JSON.stringify({ version:CACHE_VERSION, ts:Date.now(), data:data, hash:hash })); }
      catch(e2) { /* give up — app works without cache */ }
    }
  }
  function read(key) {
    if (!ok()) return null;
    var raw; try { raw=sessionStorage.getItem(key); } catch(e){ return null; }
    if (!raw) return null;
    var entry; try { entry=JSON.parse(raw); } catch(e){ try{sessionStorage.removeItem(key);}catch(e2){} return null; }
    if (!entry||typeof entry!=='object'||entry.version!==CACHE_VERSION) { try{sessionStorage.removeItem(key);}catch(e2){} return null; }
    var ts=safeNum(entry.ts); var now=Date.now();
    if (ts===null||ts>now||now-ts>CACHE_TTL_MS) { try{sessionStorage.removeItem(key);}catch(e2){} return null; }
    // Integrity check: verify hash matches data
    if (entry.hash !== undefined) {
      var expected = djb2(JSON.stringify(entry.data));
      if (entry.hash !== expected) { try{sessionStorage.removeItem(key);}catch(e2){} return null; }
    }
    return entry.data!==undefined?entry.data:null;
  }
  function remove(key) { if(!ok())return; try{sessionStorage.removeItem(key);}catch(e){} }
  function clearAll() { remove(POLY_CACHE_KEY); remove(ODDS_CACHE_KEY); }
  return { write:write, read:read, remove:remove, clearAll:clearAll, ok:ok };
})();

// ===================================================
// VALIDATORS
// ===================================================
function isUFCMarket(item) {
  var q=(item.question||item.market_slug||'').toLowerCase();
  return q.indexOf('ufc')>=0 || q.indexOf('mma')>=0;
}

function parsePolyPage(raw) {
  // Gamma API: flat array of markets
  // CLOB API: { data: [...], next_cursor }
  var items=Array.isArray(raw) ? raw : (raw&&Array.isArray(raw.data) ? raw.data : null);
  if (!items) return null;
  var fights=[];
  for (var i=0;i<items.length;i++) {
    var item=items[i];
    if (!item||typeof item!=='object') continue;
    if (item.closed) continue; // Skip resolved markets

    // Extract fighter names and prices from either format
    var f1=null, f2=null, p1r=null, p2r=null;

    // Gamma API format: outcomes[] + outcomePrices[]
    if (Array.isArray(item.outcomes)&&item.outcomes.length>=2&&Array.isArray(item.outcomePrices)&&item.outcomePrices.length>=2) {
      f1=safeStr(item.outcomes[0]); f2=safeStr(item.outcomes[1]);
      p1r=parseFloat(item.outcomePrices[0]); p2r=parseFloat(item.outcomePrices[1]);
    }
    // CLOB API format: tokens[]
    else if (Array.isArray(item.tokens)&&item.tokens.length>=2) {
      f1=safeStr(item.tokens[0].outcome); f2=safeStr(item.tokens[1].outcome);
      p1r=safeNum(item.tokens[0].price); p2r=safeNum(item.tokens[1].price);
    }

    if (!f1||!f2) continue;
    // Skip Yes/No prop bets — we want fighter vs fighter
    if ((f1==='Yes'&&f2==='No')||(f1==='No'&&f2==='Yes')) continue;
    if (!isFinite(p1r)||!isFinite(p2r)||p1r<0||p1r>1||p2r<0||p2r>1) continue;
    var sum=p1r+p2r, dev=Math.abs(sum-1);
    if (dev>PROB_SUM_MAX) continue;
    var norm=dev>0?sum:1;
    var id=safeStr(item.conditionId||item.condition_id||item.id||'')||('poly-'+fights.length);
    fights.push({ id:id, f1:sanitize(f1), f2:sanitize(f2), polyP1:clamp(p1r/norm,0,1), polyP2:clamp(p2r/norm,0,1) });
  }
  return fights;
}

function americanToImplied(a) {
  var n=safeNum(a); if(n===null||n===0)return null;
  return n>0 ? 100/(n+100) : Math.abs(n)/(Math.abs(n)+100);
}

function impliedToAmerican(p) {
  if (p===null||p===undefined||!isFinite(p)||p<=0||p>=1) return null;
  return p>=0.5 ? Math.round(-100*p/(1-p)) : Math.round(100*(1-p)/p);
}

function formatAmerican(odds) {
  if (odds===null) return '';
  return odds>0 ? ('+'+odds) : String(odds);
}

function validateOddsAPI(raw) {
  if (!Array.isArray(raw)) return null;
  var fights=[];
  for (var i=0;i<raw.length;i++) {
    var ev=raw[i];
    if (!ev||typeof ev!=='object') continue;
    var home=safeStr(ev.home_team), away=safeStr(ev.away_team);
    if (!home||!away) continue;
    if (!Array.isArray(ev.bookmakers)||!ev.bookmakers.length) continue;
    var sh=0,sa=0,cnt=0;
    var commenceTime=safeStr(ev.commence_time)||null;
    for (var b=0;b<ev.bookmakers.length;b++) {
      var bk=ev.bookmakers[b];
      if (!bk||!Array.isArray(bk.markets)) continue;
      for (var m=0;m<bk.markets.length;m++) {
        var mkt=bk.markets[m];
        if (!mkt||mkt.key!=='h2h'||!Array.isArray(mkt.outcomes)||mkt.outcomes.length<2) continue;
        var hp=null,ap=null;
        for (var o=0;o<mkt.outcomes.length;o++) {
          var oc=mkt.outcomes[o];
          if (!oc||typeof oc!=='object') continue;
          var nm=safeStr(oc.name), pr=safeNum(oc.price); if(!nm||pr===null)continue;
          if (nm===home) hp=americanToImplied(pr);
          else if (nm===away) ap=americanToImplied(pr);
        }
        if (hp===null||ap===null) continue;
        var s=hp+ap, d=Math.abs(s-1);
        if (d>PROB_SUM_MAX) continue;
        sh+=hp/s; sa+=ap/s; cnt++;
      }
    }
    if (!cnt) continue;
    var fid=safeStr(ev.id||'')||('odds-'+fights.length);
    fights.push({ id:fid, f1:sanitize(home), f2:sanitize(away), oddsP1:clamp(sh/cnt,0,1), oddsP2:clamp(sa/cnt,0,1), commenceTime:commenceTime });
  }
  return fights;
}

// ===================================================
// COMPUTE
// ===================================================
function computeCI(probs) {
  // Spec: mean = average implied probability, stddev = std dev, 95% CI = mean ± 1.96 × stddev
  if (!probs.length) return { lo:0.5, hi:0.5, mean:0.5 };
  var sum=0;
  for (var i=0;i<probs.length;i++) sum+=probs[i];
  var mean=sum/probs.length;
  if (probs.length===1) return { lo:mean, hi:mean, mean:mean };
  var sqSum=0;
  for (var j=0;j<probs.length;j++) sqSum+=(probs[j]-mean)*(probs[j]-mean);
  var stddev=Math.sqrt(sqSum/probs.length);
  return { lo:clamp(mean-1.96*stddev,0,1), hi:clamp(mean+1.96*stddev,0,1), mean:mean };
}

function riskTier(p) {
  return p>=TIER_LOCK_MIN ? TIER.LOCK
       : p>=TIER_LEAN_MIN ? TIER.LEAN
       : p>=TIER_TOSSUP_MIN ? TIER.TOSSUP
       : TIER.UPSET;
}

function upsetScore(closeness, ciWidth, disagDelta) {
  // Spec: factors are closeness to 50/50, CI width (wider = more uncertain), source disagreement
  var closenessFactor = clamp(1 - Math.abs(closeness - 0.5) * 2, 0, 1); // 1 at 50%, 0 at 0% or 100%
  var ciFactor = clamp(ciWidth * 5, 0, 1); // wider CI = more uncertain
  var disagFactor = disagDelta !== null ? clamp(disagDelta * 5, 0, 1) : 0; // higher disagreement = more upset potential
  var raw = closenessFactor * 0.4 + ciFactor * 0.3 + disagFactor * 0.3;
  return clamp(Math.round(raw * 100), 0, 100);
}

function disagreement(a,b) {
  if (a===null||b===null) return { level:'na', delta:null };
  var d=Math.abs(a-b);
  return {
    level: d<DISAGREE_LOW_MAX ? 'low'
         : d<=DISAGREE_MED_MAX ? 'med'
         : 'high',
    delta: d
  };
}

function computeFight(f) {
  var probs=[];
  if (f.polyP1!=null) probs.push(f.polyP1);
  if (f.oddsP1!=null) probs.push(f.oddsP1);
  if (!probs.length) return null;
  var cP1=probs.reduce(function(a,b){return a+b;},0)/probs.length;
  var cP2=clamp(1-cP1,0,1);
  var fav1=cP1>=cP2;
  var favP=fav1?cP1:cP2, dogP=fav1?cP2:cP1;
  var dis=disagreement(f.polyP1!=null?f.polyP1:null, f.oddsP1!=null?f.oddsP1:null);
  // Spec-correct CI: mean ± 1.96 × stddev across sources
  var favProbs=[];
  if (f.polyP1!=null) favProbs.push(fav1?f.polyP1:clamp(1-f.polyP1,0,1));
  if (f.oddsP1!=null) favProbs.push(fav1?f.oddsP1:clamp(1-f.oddsP1,0,1));
  var ci=computeCI(favProbs);
  // Spec: Upset Alert when CI crosses 50% OR sources disagree significantly with thin margin
  var ciCrosses50 = ci.lo < 0.5 && ci.hi > 0.5;
  var thinMarginHighDisagree = dis.level === 'high' && favP < TIER_LEAN_MIN;
  var tier = (ciCrosses50 || thinMarginHighDisagree) ? TIER.UPSET : riskTier(favP);
  var ciWidth = ci.hi - ci.lo;
  return {
    id:f.id, f1:f.f1, f2:f.f2,
    favName:fav1?f.f1:f.f2, dogName:fav1?f.f2:f.f1,
    favProb:favP, underdogProb:dogP,
    consensusP1:cP1, consensusP2:cP2,
    americanP1:impliedToAmerican(cP1), americanP2:impliedToAmerican(cP2),
    ci:ci,
    tier:tier,
    upset:upsetScore(dogP, ciWidth, dis.delta),
    disagree:dis,
    sources:{ poly:f.polyP1!=null, odds:f.oddsP1!=null },
    polyP1:f.polyP1!=null?f.polyP1:null,
    oddsP1:f.oddsP1!=null?f.oddsP1:null,
    commenceTime:f.commenceTime||null
  };
}

// ===================================================
// SPOTLIGHT — pick the most interesting fight
// ===================================================
function identifySpotlight(computed) {
  if (!computed.length) return null;
  // Priority 1: Upset Alert with highest disagreement
  var upsets = computed.filter(function(f){ return f.tier === TIER.UPSET; });
  if (upsets.length) {
    upsets.sort(function(a,b){ return b.upset - a.upset; });
    return { fight: upsets[0], reason: 'Upset Alert — the underdog has a real shot' };
  }
  // Priority 2: Highest disagreement across all fights
  var withDis = computed.filter(function(f){ return f.disagree.delta !== null; });
  if (withDis.length) {
    withDis.sort(function(a,b){ return (b.disagree.delta||0) - (a.disagree.delta||0); });
    if (withDis[0].disagree.delta > 0.03) {
      return { fight: withDis[0], reason: 'Books disagree most on this fight' };
    }
  }
  // Priority 3: Lock with lowest favProb (closest to dropping tier)
  var locks = computed.filter(function(f){ return f.tier === TIER.LOCK; });
  if (locks.length) {
    locks.sort(function(a,b){ return a.favProb - b.favProb; });
    return { fight: locks[0], reason: 'Closest lock to the lean line' };
  }
  // Fallback: first fight
  return { fight: computed[0], reason: 'Featured fight' };
}

// ===================================================
// EVENT GROUPING — cluster fights by commence_time
// ===================================================
function groupByEvent(computed) {
  var hasDate = computed.some(function(f){ return f.commenceTime; });
  if (!hasDate) {
    // Check if only poly data (no dates)
    var allPoly = computed.every(function(f){ return !f.sources.odds; });
    return [{ name: allPoly ? 'UFC Markets' : 'Upcoming UFC', fights: computed }];
  }
  // Group by date (YYYY-MM-DD from commence_time)
  var groups = {};
  var order = [];
  for (var i = 0; i < computed.length; i++) {
    var f = computed[i];
    var dateKey = f.commenceTime ? f.commenceTime.slice(0, 10) : 'unknown';
    if (!groups[dateKey]) {
      groups[dateKey] = [];
      order.push(dateKey);
    }
    groups[dateKey].push(f);
  }
  order.sort();
  return order.map(function(key) {
    var label = key === 'unknown' ? 'Upcoming UFC' : formatEventDate(key);
    return { name: label, fights: groups[key] };
  });
}

function formatEventDate(isoDate) {
  try {
    var d = new Date(isoDate + 'T00:00:00Z');
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return 'UFC — ' + months[d.getUTCMonth()] + ' ' + d.getUTCDate() + ', ' + d.getUTCFullYear();
  } catch(e) {
    return 'Upcoming UFC';
  }
}

// ===================================================
// FETCH - Polymarket with pagination
// ===================================================
async function fetchWithRetry(url, opts, retries) {
  var lastErr;
  for (var attempt = 0; attempt <= (retries || 0); attempt++) {
    try {
      var resp = await fetch(url, opts);
      // Don't retry 4xx — deterministic failures
      if (resp.status >= 400 && resp.status < 500) return resp;
      if (resp.ok) return resp;
      // 5xx — retry
      lastErr = new Error('HTTP ' + resp.status);
      if (attempt < (retries || 0)) await new Promise(function(r){setTimeout(r, 2000);});
    } catch(e) {
      if (e && e.name === 'AbortError') throw e; // Don't retry user aborts
      lastErr = e;
      if (attempt < (retries || 0)) await new Promise(function(r){setTimeout(r, 2000);});
    }
  }
  throw lastErr;
}

async function fetchPolymarket(signal) {
  var cached=cache.read(POLY_CACHE_KEY);
  if (cached!==null) return { fights:cached, error:null, fromCache:true };

  var allItems=[];
  var cursor=null;

  // CLOB API: cursor pagination, returns { data, next_cursor }
  for (var page=0; page<POLY_MAX_PAGES; page++) {
    var ctrl=new AbortController();
    var timer=setTimeout(function(){ctrl.abort();},FETCH_TIMEOUT_MS);
    if (signal) signal.addEventListener('abort', function(){ctrl.abort();}, {once:true});
    try {
      var params=new URLSearchParams({ tag_slug:'ufc', active:'true', limit:String(POLY_PAGE_SIZE) });
      if (cursor) params.set('next_cursor', cursor);

      var resp;
      try {
        resp=await fetchWithRetry(POLY_BASE+'/markets?'+params,
          { signal:ctrl.signal, headers:{'Accept':'application/json'} }, 1);
      } catch(e) {
        if (allItems.length) break;
        return { fights:null, error:e&&e.name==='AbortError'?'Polymarket timed out (>8s)':'Polymarket network error: '+String(e&&e.message||e).slice(0,120) };
      }
      if (!resp.ok) {
        if (allItems.length) break;
        return { fights:null, error:'Polymarket HTTP '+resp.status };
      }
      var body; try { body=await resp.json(); } catch(e){
        if (allItems.length) break;
        return { fights:null, error:'Polymarket: invalid JSON' };
      }

      var items=Array.isArray(body) ? body : (body&&Array.isArray(body.data) ? body.data : null);
      if (!items) {
        if (allItems.length) break;
        return { fights:null, error:'Polymarket: unexpected response shape' };
      }
      for (var fi=0;fi<items.length;fi++) allItems.push(items[fi]);

      var nextCursor=body&&body.next_cursor?safeStr(body.next_cursor):null;
      if (!nextCursor||items.length<POLY_PAGE_SIZE) break;
      cursor=nextCursor;
    } finally { clearTimeout(timer); }
  }

  // Client-side UFC filter (tag_slug filter is unreliable — returns all sports)
  var ufcItems=allItems.filter(isUFCMarket);
  var fights=parsePolyPage(ufcItems);

  if (!fights||!fights.length) return { fights:null, error:'Polymarket: no active UFC fight markets found ('+allItems.length+' total markets checked)' };

  // Deduplicate by id
  var seen={};
  var deduped=[];
  for (var di=0;di<fights.length;di++) {
    if (seen[fights[di].id]) continue;
    seen[fights[di].id]=true;
    deduped.push(fights[di]);
  }

  cache.write(POLY_CACHE_KEY, deduped);
  return { fights:deduped, error:null, fromCache:false };
}

async function fetchOddsAPI(apiKey, signal) {
  var key=typeof apiKey==='string'?apiKey.trim():'';
  if (!key) return { fights:null, error:'No API key', quotaRemaining:null };
  var cached=cache.read(ODDS_CACHE_KEY);
  if (cached!==null) return { fights:cached, error:null, quotaRemaining:null, fromCache:true };
  var ctrl=new AbortController();
  var timer=setTimeout(function(){ctrl.abort();},FETCH_TIMEOUT_MS);
  if (signal) signal.addEventListener('abort', function(){ctrl.abort();}, {once:true});
  try {
    var p=new URLSearchParams({ apiKey:key, regions:'us', markets:'h2h', oddsFormat:'american', bookmakers:'draftkings,fanduel' });
    var resp;
    try {
      resp=await fetchWithRetry(ODDS_BASE+'/?'+p,{ signal:ctrl.signal, headers:{'Accept':'application/json'} }, 1);
    } catch(e) {
      return { fights:null, error:e&&e.name==='AbortError'?'Odds API timed out (>8s)':'Odds API network error: '+String(e&&e.message||e).slice(0,120), quotaRemaining:null };
    }
    var qr=resp.headers.get('x-requests-remaining');
    var quota=qr!==null?parseInt(qr,10):null;
    if (resp.status===401||resp.status===403) return { fights:null, error:'Odds API: Invalid or unauthorized key', quotaRemaining:quota };
    if (resp.status===422||resp.status===429) return { fights:null, error:'Odds API: Quota exceeded', quotaRemaining:0 };
    if (!resp.ok) return { fights:null, error:'Odds API HTTP '+resp.status, quotaRemaining:quota };
    var body; try { body=await resp.json(); } catch(e){ return { fights:null, error:'Odds API: invalid JSON', quotaRemaining:quota }; }
    var fights=validateOddsAPI(body);
    if (!fights) return { fights:null, error:'Odds API: unexpected shape', quotaRemaining:quota };
    cache.write(ODDS_CACHE_KEY, fights);
    return { fights:fights, error:null, quotaRemaining:quota, fromCache:false };
  } finally { clearTimeout(timer); }
}

// ===================================================
// MERGE
// ===================================================
function lastName(n) { if(!n)return''; var parts=n.trim().split(/\s+/); return parts[parts.length-1].toLowerCase(); }
function normName(n) { return (n||'').trim().toLowerCase().replace(/\s+/g,' '); }

function mergeResults(poly, odds) {
  if (!poly) return (odds||[]).map(function(f){return Object.assign({},f);});
  if (!odds) return poly.map(function(f){return Object.assign({},f);});
  var used={}, out=[];
  for (var i=0;i<poly.length;i++) {
    var pf=poly[i];
    var pn1=normName(pf.f1), pn2=normName(pf.f2);
    var pl1=lastName(pf.f1), pl2=lastName(pf.f2);
    var bi=null;
    // Pass 1: exact full-name match (case-insensitive)
    for (var j=0;j<odds.length;j++) {
      if (used[j]) continue;
      var on1=normName(odds[j].f1), on2=normName(odds[j].f2);
      if ((on1===pn1&&on2===pn2)||(on1===pn2&&on2===pn1)){ bi=j; break; }
    }
    // Pass 2: last-name match (fallback for name format differences)
    if (bi===null) {
      for (var j2=0;j2<odds.length;j2++) {
        if (used[j2]) continue;
        var ol1=lastName(odds[j2].f1), ol2=lastName(odds[j2].f2);
        if ((ol1===pl1&&ol2===pl2)||(ol1===pl2&&ol2===pl1)){ bi=j2; break; }
      }
    }
    if (bi!==null) { used[bi]=true; out.push(Object.assign({},pf,{oddsP1:odds[bi].oddsP1,oddsP2:odds[bi].oddsP2,commenceTime:odds[bi].commenceTime||null})); }
    else out.push(Object.assign({},pf,{oddsP1:null,oddsP2:null}));
  }
  for (var k=0;k<odds.length;k++) { if(!used[k]) out.push(Object.assign({},odds[k],{polyP1:null,polyP2:null})); }
  return out;
}

        dismissActivePopover();
        if (!isVisible) {
          popover.classList.add('visible');
          activePopover = popover;
        }
      });
    } else {
      // Desktop: hover to reveal
      row.addEventListener('mouseenter', function() {
        dismissActivePopover();
        popover.classList.add('visible');
        activePopover = popover;
      });
      row.addEventListener('mouseleave', function() {
        popover.classList.remove('visible');
        if (activePopover === popover) activePopover = null;
      });
    }

    // Keyboard: Enter/Space to toggle
    row.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        var isVisible = popover.classList.contains('visible');
        dismissActivePopover();
        if (!isVisible) {
          popover.classList.add('visible');
          activePopover = popover;
        }
      } else if (e.key === 'Escape') {
        popover.classList.remove('visible');
        if (activePopover === popover) activePopover = null;
      }
    });
  }

  return row;
}

    return;
  }
  fightCountEl.classList.remove('hidden'); fightCountEl.textContent=computed.length+' fight'+(computed.length!==1?'s':'');
  var to={lock:0,lean:1,tossup:2,upset:3};
  var sorted=computed.slice().sort(function(a,b){ var ta=to[a.tier]!==undefined?to[a.tier]:4, tb=to[b.tier]!==undefined?to[b.tier]:4; return ta!==tb?ta-tb:b.favProb-a.favProb; });

  // Group by event
  var groups = groupByEvent(sorted);

var isRunning=false;

async function run(force) {
  if (isRunning) {
    // Abort current run and reschedule
    if (_activeController) _activeController.abort();
    isRunning=false;
    setTimeout(function(){ run(force); }, 0);
    return;
  }
  isRunning=true;
  refreshBtn.setAttribute('disabled','');

  // Create a new AbortController for this run
  if (_activeController) _activeController.abort();
  _activeController=new AbortController();
  var signal=_activeController.signal;

  try {
    clearBanners();
    var oldCards=fightGridEl.querySelectorAll('.fight-card,.empty-state,.event-group-header');
    for(var r=0;r<oldCards.length;r++) oldCards[r].remove();
    mainLoadEl.classList.remove('hidden');
    showSkeletons(6);
    spotlightEl.classList.add('hidden');
    safestLoadEl.classList.remove('hidden'); safestListEl.classList.add('hidden'); safestEmptyEl.classList.add('hidden');
    upsetLoadEl.classList.remove('hidden'); upsetListEl.classList.add('hidden'); upsetEmptyEl.classList.add('hidden');
    if (force) cache.clearAll();

    // Offline detection: try cached data if navigator says offline
    if (typeof navigator.onLine!=='undefined'&&!navigator.onLine) {
      var cachedPoly=cache.read(POLY_CACHE_KEY);
      var cachedOdds=cache.read(ODDS_CACHE_KEY);
      if (cachedPoly||cachedOdds) {
        addBanner('warn','Offline','Showing cached data. Connect to the internet and refresh for live odds.', false);
        var merged=mergeResults(cachedPoly, cachedOdds);
        var computed=merged.map(computeFight).filter(Boolean);
        renderSpotlight(computed); renderSummary(computed); renderFights(computed);
        lastUpdEl.textContent='Cached data (offline)'; lastUpdEl.classList.remove('hidden');
        return;
      }
    }

    var apiKey=loadKey();
    if (!apiKey) addBanner('info','No Odds API key','Showing Polymarket data only. Add your key above for DraftKings/FanDuel odds.');

    var results=await Promise.all([
      fetchPolymarket(signal),
      apiKey?fetchOddsAPI(apiKey, signal):Promise.resolve({fights:null,error:null,quotaRemaining:null})
    ]);

    // If aborted mid-flight, bail out silently
    if (signal.aborted) return;

    var polyRes=results[0], oddsRes=results[1];

    if (polyRes.error) addBanner('warn','Polymarket unavailable',polyRes.error, false);
    if (apiKey&&oddsRes.error&&oddsRes.error!=='No API key') addBanner('warn','Odds API unavailable',oddsRes.error, false);

    var qr=oddsRes.quotaRemaining;
    updateQuotaBadge(isFinite(qr)?qr:null);
    if (qr!==null&&isFinite(qr)&&qr<QUOTA_WARN) addBanner('warn','Odds API quota low: '+qr+' requests remaining','Consider refreshing less frequently to preserve quota.', false);

    if (!polyRes.fights&&!oddsRes.fights) { showAllFailed(); return; }

    var merged=mergeResults(polyRes.fights, oddsRes.fights);
    var computed=merged.map(computeFight).filter(Boolean);

    renderSpotlight(computed);
    renderSummary(computed);
    renderFights(computed);

    var now=new Date(); lastUpdEl.textContent='Updated '+now.toLocaleTimeString(); lastUpdEl.classList.remove('hidden');

    var cachedSources=[];
    if (polyRes.fromCache) cachedSources.push('Polymarket');
    if (oddsRes.fromCache) cachedSources.push('Odds API');
    if (cachedSources.length) addBanner('info',null,'Using cached data: '+cachedSources.join(', ')+' (15-min TTL). Click Refresh to force reload.');
  } catch(e) {
    if (e&&e.name==='AbortError') return; // Silently bail on abort
    throw e;
  } finally {
    _activeController=null;
    isRunning=false;
    refreshBtn.removeAttribute('disabled');
  }
}

// ===================================================
// RUNTIME SELF-TESTS (55+)
// ===================================================
function runSelfTests() {
  var results=[];
  function assert(name, fn) {
    try {
      var ok=fn();
      results.push({ name:name, pass:!!ok, error:ok?null:'assertion false' });
    } catch(e) {
      results.push({ name:name, pass:false, error:String(e&&e.message||e).slice(0,80) });
    }
  }

  // --- safeNum (4) ---
  assert('safeNum(42)===42', function(){return safeNum(42)===42;});
  assert('safeNum(NaN)===null', function(){return safeNum(NaN)===null;});
  assert('safeNum(Infinity)===null', function(){return safeNum(Infinity)===null;});
  assert('safeNum("x")===null', function(){return safeNum("x")===null;});

  // --- safeStr (4) ---
  assert('safeStr("")===null', function(){return safeStr("")===null;});
  assert('safeStr("hi")==="hi"', function(){return safeStr("hi")==="hi";});
  assert('safeStr(123)===null', function(){return safeStr(123)===null;});
  assert('safeStr("  ")===null', function(){return safeStr("  ")===null;});

  // --- clamp (4) ---
  assert('clamp(5,0,10)===5', function(){return clamp(5,0,10)===5;});
  assert('clamp(-1,0,10)===0', function(){return clamp(-1,0,10)===0;});
  assert('clamp(99,0,10)===10', function(){return clamp(99,0,10)===10;});
  assert('clamp(NaN,0,10)===0', function(){return clamp(NaN,0,10)===0;});

  // --- sanitize (3) ---
  assert('sanitize strips control', function(){return sanitize("a\x00b")==="ab";});
  assert('sanitize truncates 100', function(){return sanitize("x".repeat(200)).length===100;});
  assert('sanitize(null)==="Unknown"', function(){return sanitize(null)==="Unknown";});

  // --- americanToImplied (4) ---
  assert('american -200 -> ~0.667', function(){var v=americanToImplied(-200);return v!==null&&Math.abs(v-0.6667)<0.01;});
  assert('american +150 -> 0.4', function(){var v=americanToImplied(150);return v!==null&&Math.abs(v-0.4)<0.01;});
  assert('american 0 -> null', function(){return americanToImplied(0)===null;});
  assert('american -100 -> 0.5', function(){var v=americanToImplied(-100);return v!==null&&Math.abs(v-0.5)<0.01;});

  // --- impliedToAmerican (5) ---
  assert('implied 0.6667 -> ~-200', function(){var v=impliedToAmerican(0.6667);return v!==null&&v<=-195&&v>=-205;});
  assert('implied 0.4 -> ~+150', function(){var v=impliedToAmerican(0.4);return v!==null&&v>=145&&v<=155;});
  assert('implied 0 -> null', function(){return impliedToAmerican(0)===null;});
  assert('implied 1 -> null', function(){return impliedToAmerican(1)===null;});
  assert('implied 0.5 -> -100', function(){var v=impliedToAmerican(0.5);return v===null||v===-100;});

  // --- formatAmerican (3) ---
  assert('formatAmerican positive', function(){return formatAmerican(150)==='+150';});
  assert('formatAmerican negative', function(){return formatAmerican(-200)==='-200';});
  assert('formatAmerican null', function(){return formatAmerican(null)==='';});

  // --- riskTier SPEC-EXACT boundary tests (8) ---
  assert('tier 0.80=lock', function(){return riskTier(0.80)===TIER.LOCK;});
  assert('tier 0.75=lock (boundary)', function(){return riskTier(0.75)===TIER.LOCK;});
  assert('tier 0.749=lean (just below lock)', function(){return riskTier(0.749)===TIER.LEAN;});
  assert('tier 0.65=lean', function(){return riskTier(0.65)===TIER.LEAN;});
  assert('tier 0.60=lean (boundary)', function(){return riskTier(0.60)===TIER.LEAN;});
  assert('tier 0.599=tossup (just below lean)', function(){return riskTier(0.599)===TIER.TOSSUP;});
  assert('tier 0.50=tossup', function(){return riskTier(0.50)===TIER.TOSSUP;});
  assert('tier 0.45=tossup (boundary)', function(){return riskTier(0.45)===TIER.TOSSUP;});
  assert('tier 0.449=upset (just below tossup)', function(){return riskTier(0.449)===TIER.UPSET;});
  assert('tier 0.40=upset', function(){return riskTier(0.40)===TIER.UPSET;});
  assert('tier 1.0=lock', function(){return riskTier(1.0)===TIER.LOCK;});
  assert('tier 0.0=upset', function(){return riskTier(0.0)===TIER.UPSET;});

  // --- computeCI (4) ---
  assert('computeCI single source', function(){var ci=computeCI([0.7]);return ci.lo===0.7&&ci.hi===0.7&&ci.mean===0.7;});
  assert('computeCI two sources', function(){var ci=computeCI([0.7,0.8]);return ci.mean===0.75&&ci.lo<0.75&&ci.hi>0.75;});
  assert('computeCI clamped', function(){var ci=computeCI([0.01,0.99]);return ci.lo>=0&&ci.hi<=1;});
  assert('computeCI empty', function(){var ci=computeCI([]);return ci.mean===0.5;});

  // --- upsetScore 3-factor (5) ---
  assert('upset near 50/50 high', function(){return upsetScore(0.48, 0.2, 0.1) > 50;});
  assert('upset heavy fav low', function(){return upsetScore(0.15, 0.02, 0.01) < 30;});
  assert('upset wide CI increases score', function(){return upsetScore(0.35, 0.3, 0) > upsetScore(0.35, 0.05, 0);});
  assert('upset high disagree increases score', function(){return upsetScore(0.35, 0.1, 0.15) > upsetScore(0.35, 0.1, 0);});
  assert('upset clamped 0-100', function(){return upsetScore(0.5, 1, 1) <= 100 && upsetScore(0, 0, 0) >= 0;});

  // --- disagreement SPEC-EXACT boundary tests (10) ---
  assert('disagree null->na', function(){return disagreement(null,0.5).level==='na';});
  assert('disagree both null->na', function(){return disagreement(null,null).level==='na';});
  assert('disagree 0pp delta->low (Strong Consensus)', function(){return disagreement(0.7,0.7).level==='low';});
  assert('disagree 2pp delta->low (<3%)', function(){return disagreement(0.7,0.72).level==='low';});
  assert('disagree 2.9pp->low (just under 3%)', function(){return disagreement(0.70,0.729).level==='low';});
  assert('disagree 3pp->med (3% boundary)', function(){return disagreement(0.70,0.73).level==='med';});
  assert('disagree 5pp->med (mid range)', function(){return disagreement(0.70,0.75).level==='med';});
  assert('disagree 7.5pp->med (mid range)', function(){return disagreement(0.70,0.775).level==='med';});
  assert('disagree 8.1pp->high (just over 8%)', function(){return disagreement(0.70,0.781).level==='high';});
  assert('disagree 20pp->high (Books Disagree)', function(){return disagreement(0.7,0.9).level==='high';});

  // --- disagreement delta correctness (2) ---
  assert('disagree delta correct', function(){var r=disagreement(0.7,0.8);return r.delta!==null&&Math.abs(r.delta-0.1)<0.001;});
  assert('disagree na delta is null', function(){return disagreement(null,0.5).delta===null;});

  // --- computeFight (4) ---
  assert('computeFight valid', function(){
    var r=computeFight({id:'t',f1:'A',f2:'B',polyP1:0.7,polyP2:0.3,oddsP1:null,oddsP2:null});
    return r&&r.favName==='A'&&r.tier===TIER.LEAN&&r.favProb===0.7;
  });
  assert('computeFight no data->null', function(){return computeFight({id:'t',f1:'A',f2:'B'})===null;});
  assert('computeFight merged sources', function(){
    var r=computeFight({id:'t',f1:'A',f2:'B',polyP1:0.8,polyP2:0.2,oddsP1:0.7,oddsP2:0.3});
    return r&&r.favName==='A'&&r.favProb===0.75&&r.tier===TIER.LOCK;
  });
  assert('computeFight upset tier', function(){
    var r=computeFight({id:'t',f1:'A',f2:'B',polyP1:0.4,polyP2:0.6,oddsP1:null,oddsP2:null});
    return r&&r.favName==='B'&&r.tier===TIER.LEAN;
  });

  // --- merge (4) ---
  assert('merge poly only', function(){
    var r=mergeResults([{id:'1',f1:'A',f2:'B',polyP1:0.6}],null);
    return r.length===1&&r[0].f1==='A';
  });
  assert('merge odds only', function(){
    var r=mergeResults(null,[{id:'1',f1:'A',f2:'B',oddsP1:0.6}]);
    return r.length===1&&r[0].f1==='A';
  });
  assert('merge both null->empty', function(){
    var r=mergeResults(null,null);
    return Array.isArray(r)&&r.length===0;
  });
  assert('merge matching fighters', function(){
    var r=mergeResults(
      [{id:'1',f1:'John Smith',f2:'Bob Jones',polyP1:0.6,polyP2:0.4}],
      [{id:'2',f1:'John Smith',f2:'Bob Jones',oddsP1:0.65,oddsP2:0.35}]
    );
    return r.length===1&&r[0].oddsP1===0.65&&r[0].polyP1===0.6;
  });

  // --- validatePoly (4) ---
  assert('validatePoly rejects null', function(){return parsePolyPage(null)===null;});
  assert('validatePoly rejects {}', function(){return parsePolyPage({})===null;});
  assert('validatePoly rejects bad probs', function(){
    var r=parsePolyPage([{outcomes:['A','B'],outcomePrices:['2.0','0.5']}]);
    return r!==null&&r.length===0;
  });
  assert('validatePoly parses Gamma format', function(){
    var r=parsePolyPage([{question:'UFC: A vs B',outcomes:['A','B'],outcomePrices:['0.6','0.4'],closed:false}]);
    return r!==null&&r.length===1&&r[0].f1==='A'&&Math.abs(r[0].polyP1-0.6)<0.01;
  });

  // --- validateOdds (2) ---
  assert('validateOdds rejects null', function(){return validateOddsAPI(null)===null;});
  assert('validateOdds rejects string', function(){return validateOddsAPI("bad")===null;});

  // --- lastName (3) ---
  assert('lastName single', function(){return lastName('Jones')==='jones';});
  assert('lastName multi', function(){return lastName('John Smith')==='smith';});
  assert('lastName empty', function(){return lastName('')==='';});

  // --- pct formatting (2) ---
  assert('pct 0.75 -> 75%', function(){return pct(0.75)==='75%';});
  assert('pct 0 -> 0%', function(){return pct(0)==='0%';});

  // --- constant sanity checks (3) ---
  assert('DISAGREE_LOW_MAX is 0.03', function(){return DISAGREE_LOW_MAX===0.03;});
  assert('DISAGREE_MED_MAX is 0.08', function(){return DISAGREE_MED_MAX===0.08;});
  assert('UPSET_WARN_THRESHOLD is 50', function(){return UPSET_WARN_THRESHOLD===50;});

  // === NEW TESTS (Run B additions) ===

  // --- identifySpotlight (3) ---
  assert('spotlight picks upset fight first', function(){
    var fights = [
      {tier:'lock',favProb:0.85,upset:20,disagree:{level:'low',delta:0.02}},
      {tier:'upset',favProb:0.42,upset:80,disagree:{level:'high',delta:0.12}}
    ];
    var s = identifySpotlight(fights);
    return s && s.fight.tier === 'upset' && s.reason.indexOf('Upset') >= 0;
  });
  assert('spotlight picks highest disagreement when no upsets', function(){
    var fights = [
      {tier:'lock',favProb:0.8,upset:10,disagree:{level:'low',delta:0.02}},
      {tier:'lean',favProb:0.65,upset:30,disagree:{level:'high',delta:0.09}}
    ];
    var s = identifySpotlight(fights);
    return s && s.fight.tier === 'lean';
  });
  assert('spotlight returns null for empty array', function(){
    return identifySpotlight([]) === null;
  });

  // --- groupByEvent (1) ---
  assert('groupByEvent groups undated as single group', function(){
    var fights = [
      {commenceTime:null,sources:{poly:true,odds:false}},
      {commenceTime:null,sources:{poly:true,odds:false}}
    ];
    var groups = groupByEvent(fights);
    return groups.length === 1 && groups[0].name === 'UFC Markets';
  });

  // --- fav/underdog coloring in computeFight (1) ---
  assert('computeFight preserves polyP1 for popover', function(){
    var r = computeFight({id:'t',f1:'A',f2:'B',polyP1:0.7,polyP2:0.3,oddsP1:0.65,oddsP2:0.35});
    return r && r.polyP1 === 0.7 && r.oddsP1 === 0.65;
  });

  // === NEW TESTS (Round 3 — Robustness Hardening) ===

  // --- djb2 hash (4) ---
  assert('djb2 deterministic', function(){return djb2('hello')===djb2('hello');});
  assert('djb2 different inputs differ', function(){return djb2('hello')!==djb2('world');});
  assert('djb2 empty string', function(){return typeof djb2('')==='number'&&djb2('')===5381;});
  assert('djb2 returns unsigned 32-bit', function(){return djb2('test')>=0;});

  // --- validateApiKeyFormat (4) ---
  assert('apiKey valid alphanum', function(){return validateApiKeyFormat('a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4')===true;});
  assert('apiKey rejects short', function(){return validateApiKeyFormat('abc')===false;});
  assert('apiKey rejects null', function(){return validateApiKeyFormat(null)===false;});
  assert('apiKey rejects special chars', function(){return validateApiKeyFormat('key with spaces!')===false;});

  // --- cache integrity (3) ---
  assert('cache write+read roundtrip', function(){
    cache.write('__test_rt', {x:42});
    var v=cache.read('__test_rt');
    cache.remove('__test_rt');
    return v!==null&&v.x===42;
  });
  assert('cache detects corruption', function(){
    try {
      sessionStorage.setItem('__test_corrupt', JSON.stringify({version:CACHE_VERSION,ts:Date.now(),data:{x:1},hash:99999}));
      var v=cache.read('__test_corrupt');
      sessionStorage.removeItem('__test_corrupt');
      return v===null;
    } catch(e) { return true; } // sessionStorage blocked is OK
  });
  assert('cache expired returns null', function(){
    try {
      sessionStorage.setItem('__test_exp', JSON.stringify({version:CACHE_VERSION,ts:1,data:{x:1},hash:djb2(JSON.stringify({x:1}))}));
      var v=cache.read('__test_exp');
      sessionStorage.removeItem('__test_exp');
      return v===null;
    } catch(e) { return true; }
  });

  // --- computeCI spec-correct formula (3) ---
  assert('CI uses mean±1.96*stddev', function(){
    var ci=computeCI([0.6,0.8]);
    var mean=0.7, stddev=Math.sqrt(((0.6-0.7)*(0.6-0.7)+(0.8-0.7)*(0.8-0.7))/2);
    return Math.abs(ci.lo-(mean-1.96*stddev))<0.001 && Math.abs(ci.hi-(mean+1.96*stddev))<0.001;
  });
  assert('CI three sources', function(){
    var ci=computeCI([0.5,0.6,0.7]);
    return ci.mean>0.59&&ci.mean<0.61&&ci.lo<ci.mean&&ci.hi>ci.mean;
  });
  assert('CI single source has zero width', function(){
    var ci=computeCI([0.65]);
    return ci.lo===0.65&&ci.hi===0.65;
  });

  // --- merge improvements (2) ---
  assert('merge last-name fallback', function(){
    var r=mergeResults(
      [{id:'1',f1:'Jon Jones',f2:'Tom Aspinall',polyP1:0.6,polyP2:0.4}],
      [{id:'2',f1:'Jonathan Jones',f2:'Thomas Aspinall',oddsP1:0.65,oddsP2:0.35}]
    );
    return r.length===1&&r[0].oddsP1===0.65;
  });
  assert('merge unmatched stays separate', function(){
    var r=mergeResults(
      [{id:'1',f1:'A',f2:'B',polyP1:0.6,polyP2:0.4}],
      [{id:'2',f1:'X',f2:'Y',oddsP1:0.7,oddsP2:0.3}]
    );
    return r.length===2;
  });

  // Render results
  var bar=$('selftestBar');
  var passed=results.filter(function(r){return r.pass;}).length;
  var failed=results.filter(function(r){return !r.pass;});
  bar.classList.remove('hidden');

  if (!failed.length) {
    var span=document.createElement('span');
    span.className='selftest-pass';
    span.textContent='Self-test: '+passed+'/'+results.length+' passed';
    bar.appendChild(span);
  } else {
    var fspan=document.createElement('span');
    fspan.className='selftest-fail';
    fspan.textContent='Self-test: '+failed.length+' FAILED of '+results.length;
    bar.appendChild(fspan);
    var det=document.createElement('span');
    det.style.cssText='margin-left:8px;font-size:0.65rem;';
    det.textContent=failed.map(function(f){return f.name+': '+f.error;}).join(' | ');
    bar.appendChild(det);
  }

  return { passed:passed, total:results.length, failures:failed };
}

// EVENT LISTENERS
// ===================================================
applyKeyBtn.addEventListener('click',function(){
  var v=apiKeyInput.value, t=typeof v==='string'?v.trim():'';
  if (!t){addBanner('warn','API key required','Enter a valid key before applying.', false);return;}
  if (!validateApiKeyFormat(t)){addBanner('warn','Invalid API key format','Key should be 8+ alphanumeric characters. Check your key and try again.', false);return;}
  if (!saveKey(t)){addBanner('danger','Could not save key','localStorage may be blocked in this browser.', false);return;}
  apiKeyInput.value=''; updateKeyUI(); cache.remove(ODDS_CACHE_KEY); run(false);
});
clearKeyBtn.addEventListener('click',function(){
  removeKey(); cache.clearAll(); apiKeyInput.value=''; updateKeyUI(); quotaBadgeEl.classList.add('hidden');
  addBanner('info','API key cleared','Odds API data will no longer be fetched.'); run(false);
});
refreshBtn.addEventListener('click',function(){run(true);});
apiKeyInput.addEventListener('keydown',function(e){ if(e.key==='Enter')applyKeyBtn.click(); });

// Global Escape to dismiss any open popover
document.addEventListener('keydown', function(e){ if (e.key==='Escape') dismissActivePopover(); });

// Auto-refresh when coming back online
window.addEventListener('online', function(){ addBanner('success','Back online','Refreshing data...'); run(true); });

document.addEventListener('DOMContentLoaded',function(){
  runSelfTests();
  updateKeyUI();
  run(false);
});
