<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0d1117">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x26A1;</text></svg>">
<title>{% block title %}gstack{% endblock %}</title>
<style>
/* === Shared base styles === */
:root{--anim-fast:.15s;--anim-med:.3s;--anim-slow:.5s;--ease-spring:cubic-bezier(.34,1.56,.64,1);--ease-out:cubic-bezier(.16,1,.3,1)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,system-ui,sans-serif;background:#0d1117;color:#c9d1d9;padding:0 1rem 1.5rem;max-width:800px;margin:0 auto;line-height:1.5;font-size:1rem}
.nav-bar{display:flex;justify-content:space-between;align-items:center;padding:.75rem 0;margin-bottom:1rem;border-bottom:1px solid #21262d}
.nav-bar h1{font-size:1.4rem;color:#58a6ff;margin:0}
.nav-right{display:flex;gap:1rem;align-items:center;font-size:.85rem}
.nav-link{color:#8b949e;text-decoration:none;padding:.5rem .25rem;min-height:44px;display:inline-flex;align-items:center;border-bottom:2px solid transparent;transition:color var(--anim-fast),border-color var(--anim-fast)}
.nav-link:hover{color:#c9d1d9}
.nav-link.active{color:#58a6ff;border-bottom-color:#58a6ff}
.nav-link:focus-visible{outline:2px solid #58a6ff;outline-offset:2px}
a:focus-visible{outline:2px solid #58a6ff;outline-offset:2px}
.health-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:.3rem;vertical-align:middle}
.health-ok{background:#3fb950}
.health-warn{background:#d29922}
.health-error{background:#f85149}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.4}}
.health-ok{animation:pulse-dot 3s ease-in-out infinite}
.queue-badge{color:#9ca3af;font-size:.8rem}
@keyframes shimmer{0%{background-position:-200px 0}100%{background-position:calc(200px + 100%) 0}}
.skeleton{background:linear-gradient(90deg,#161b22 0px,#1c2128 40px,#161b22 80px);background-size:200px;animation:shimmer 1.5s ease-in-out infinite}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:.8rem;margin-bottom:1.5rem}
.stat-card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:.8rem;text-align:center;transition:transform var(--anim-fast) var(--ease-spring),border-color var(--anim-fast)}
.stat-card:hover{transform:translateY(-2px);border-color:#58a6ff}
.stat-value{font-size:1.6rem;font-weight:700;color:#f0f6fc}
.stat-label{font-size:.8rem;color:#9ca3af;margin-top:.2rem}
.section-divider{border:none;border-top:1px solid #21262d;margin:1.5rem 0}
h2{font-size:1.2rem;margin:1.5rem 0 .8rem;color:#f0f6fc;font-weight:600}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(10px);background:#161b22;color:#c9d1d9;padding:.7rem 1.2rem;border-radius:8px;font-size:.88rem;font-weight:500;border:1px solid #30363d;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:1000;opacity:0;transition:opacity var(--anim-med) ease,transform var(--anim-med) var(--ease-spring);pointer-events:none;display:flex;align-items:center;gap:.5rem}
.toast.visible{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto;cursor:pointer}
.toast--success{border-color:#238636;color:#3fb950}
.toast--success::before{content:'\2713';font-weight:700}
.toast--skip{border-color:#484f58;color:#8b949e}
.toast--skip::before{content:'\2192';font-weight:700}
.toast--error{border-color:#f85149;color:#f85149}
.toast--error::before{content:'\0021';font-weight:700}
.user-info{font-size:.78rem;color:#484f58}
.tone-badge{display:inline-block;padding:1px 6px;border-radius:10px;font-size:.7rem;font-weight:600;background:#1c2d4a;color:#58a6ff;margin-left:.3rem}
@media(max-width:480px){.health-dot{width:10px;height:10px}.queue-badge{font-size:.9rem}.nav-right{gap:.5rem;font-size:.8rem}}
@media(prefers-reduced-motion:reduce){.health-ok{animation:none}.toast{transition:none}.nav-link{transition:none}.skeleton{animation:none}.stat-card{transition:none}}
{% block extra_css %}{% endblock %}
</style>
</head>
<body>
<nav class="nav-bar">
  <h1>{% block page_title %}gstack{% endblock %}</h1>
  <div class="nav-right">
    {% block nav_status %}{% endblock %}
    <a href="/dashboard" class="nav-link{% if active_page == 'dashboard' %} active{% endif %}">Dashboard</a>
    <a href="/stats" class="nav-link{% if active_page == 'stats' %} active{% endif %}">Stats</a>
    <a href="/settings" class="nav-link{% if active_page == 'settings' %} active{% endif %}">Settings</a>
    {% if user is defined and user and user.is_admin %}
    <a href="/admin" class="nav-link{% if active_page == 'admin' %} active{% endif %}">Admin</a>
    {% endif %}
  </div>
</nav>

{% block content %}{% endblock %}

<div class="toast" id="toast"></div>

{% block scripts %}{% endblock %}
</body>
</html>
