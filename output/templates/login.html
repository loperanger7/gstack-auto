<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0d1117">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x26A1;</text></svg>">
<title>gstack - Login</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,system-ui,sans-serif;background:#0d1117;color:#c9d1d9;display:flex;justify-content:center;align-items:center;min-height:100vh}
.login-box{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:2.5rem;text-align:center;max-width:380px;width:90%}
h1{font-size:1.6rem;color:#58a6ff;margin-bottom:.5rem}
.subtitle{color:#8b949e;font-size:.9rem;margin-bottom:2rem}
.btn-google{display:inline-flex;align-items:center;gap:.6rem;background:#238636;color:#fff;border:none;border-radius:6px;padding:.75rem 1.5rem;font-size:.95rem;font-weight:500;cursor:pointer;text-decoration:none;min-height:44px;transition:background .15s}
.btn-google:hover{background:#2ea043}
.btn-google:focus-visible{outline:2px solid #58a6ff;outline-offset:2px}
.error{color:#f85149;font-size:.85rem;margin-bottom:1rem;padding:.5rem;background:#3d1f1f;border-radius:6px}
.footer{margin-top:2rem;color:#484f58;font-size:.75rem}
</style>
</head>
<body>
<div class="login-box">
  <h1>gstack</h1>
  <p class="subtitle">Twitter Auto-Reply SaaS</p>

  {% if error %}
  <div class="error">
    {% if error == "auth_failed" %}Authentication failed. Please try again.
    {% elif error == "no_email" %}Could not retrieve your email from Google.
    {% else %}{{ error }}{% endif %}
  </div>
  {% endif %}

  <a href="/auth/google" class="btn-google">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12.24 10.285V14.4h6.806c-.275 1.765-2.056 5.174-6.806 5.174-4.095 0-7.439-3.389-7.439-7.574s3.345-7.574 7.439-7.574c2.33 0 3.891.989 4.785 1.849l3.254-3.138C18.189 1.186 15.479 0 12.24 0c-6.635 0-12 5.365-12 12s5.365 12 12 12c6.926 0 11.52-4.869 11.52-11.726 0-.788-.085-1.39-.189-1.989H12.24z"/></svg>
    Sign in with Google
  </a>

  <p class="footer">Secure OAuth login. No passwords stored.</p>
</div>
</body>
</html>
