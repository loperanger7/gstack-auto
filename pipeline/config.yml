# gstack-auto Pipeline Configuration (v2)

# Number of parallel runs. Override from invocation prompt: "run with N=5"
parallel_runs: 3

# Number of sequential rounds. Each round runs N parallel attempts,
# auto-selects the winner, commits it, and feeds it into the next round.
# Override from invocation prompt: "run 5 rounds"
rounds: 3

# When true, the highest-scoring run is automatically selected as the
# winner after each round. When false (and rounds=1), the user picks
# via the dashboard. Ignored when rounds > 1 (auto-accept is implied).
auto_accept_winner: true

# Style inspiration — name a legendary engineer whose coding philosophy
# should guide implementation, review, and scoring. Looks for a matching
# file in pipeline/styles/{name}.md. Leave blank for the default style.
# Available: carmack, antirez, abramov, metz, holowaychuk, majors, marlinspike
style: "marlinspike"

# Maximum bug-fix cycles before forced scoring (QA sub-loop in Phase 11)
max_fix_cycles: 3

# Design review: run design plan phase (Phase 05) on output.
# Set to false to skip Phase 05. Auto-skipped when output has no HTML.
design_review: true

# Design style inspiration — name a design philosophy that should guide
# design planning and implementation. Looks for a matching file in
# pipeline/design-styles/{name}.md. Leave blank for the default style.
# Available: dieter-rams, brutalist, playful
design_style: ""

# Adversarial review phases — list of phase numbers where dual Claude+Codex
# adversarial review runs. The orchestrator executes these between agent phases.
# Default: [02, 08] — after CEO plan and before implementation.
# Full mode: [02, 04, 06, 08] — after every planning phase.
# Empty list [] disables adversarial review entirely.
adversarial_reviews: ["02", "08"]

# Follow-up question budget per round. Shared across all N parallel runs.
# The orchestrator collects questions from agents, deduplicates, and asks
# the user. Set to 0 to disable follow-up questions (fully autonomous).
follow_up_budget: 3

# Scoring dimensions (must match rubric.md)
# design_quality is added automatically when design review runs.
scoring_dimensions:
  - functionality
  - code_quality
  - test_coverage
  - ux_polish
  - spec_adherence
  - design_quality

# Score penalty for exhausting max_fix_cycles without clearing bugs
unresolved_bugs_penalty: 2.0

# Email notification configuration
# Set method to "file-only" to skip email and just save results to disk.
email:
  to: ""
  method: "file-only"
  smtp:
    host: "smtp.gmail.com"
    port: 587
    username: "$PATTAYA_SMTP_USER"
    password: "$PATTAYA_SMTP_PASS"
