# Pattaya Pipeline Configuration

# Number of parallel runs. Override from invocation prompt: "run with N=5"
parallel_runs: 3

# Maximum bug-fix cycles before forced scoring (phases 07-11 loop)
max_fix_cycles: 3

# Scoring dimensions (must match rubric.md)
scoring_dimensions:
  - functionality
  - code_quality
  - test_coverage
  - ux_polish
  - spec_adherence

# Score penalty for exhausting max_fix_cycles without clearing bugs
unresolved_bugs_penalty: 2.0

# Email notification configuration
# Set method to "file-only" to skip email and just save results to disk.
email:
  to: ""
  method: "smtp"
  smtp:
    host: "smtp.gmail.com"
    port: 587
    username: "$PATTAYA_SMTP_USER"
    password: "$PATTAYA_SMTP_PASS"
