app = 'gstack-mission-control'
primary_region = 'sjc'

[build]

[env]
  DATABASE_PATH = '/data/app.db'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

[mounts]
  source = 'mc_data'
  destination = '/data'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
